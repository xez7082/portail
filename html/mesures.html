<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesures — Ecojoko</title>
<style>
:root{
  --bg:#1c2431; --card:#27303f; --card2:#2f3a4c; --line:#3c4a5e; --txt:#eef3fa;
  --dim:#aebdd0; --dim2:#55677f; --accent:#4da3ff; --ok:#3fae64; --okl:#7ddb9a; --bad:#ff6b62;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:ui-monospace,Consolas,"Segoe UI Mono",monospace;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;padding:16px;gap:12px}
#hdr{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
#hdr .t{font-size:clamp(15px,2.2vh,19px);letter-spacing:.16em;color:var(--okl);font-weight:800}
#now{font-size:clamp(30px,5vh,44px);font-weight:800;color:var(--okl)}
#now small{font-size:.45em;color:var(--dim)}
#sub{font-size:13px;color:var(--dim2);letter-spacing:.1em}
#wrap{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px;min-height:0}
canvas{width:100%;height:100%;display:block}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <span class="t">⚡ CONSOMMATION ECOJOKO — AUJOURD'HUI</span>
    <span id="now">-- <small>W</small></span>
    <span id="sub">Historique + temps réel</span>
  </div>
  <div id="wrap"><canvas id="ch"></canvas></div>
</div>

<script>
"use strict";
const CFG={
  HA_URL:location.origin, /* local + Nabu Casa */
  HA_TOKEN:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI1MTdmOWM3YWU1ZjE0MzZjYjNjYzQ2Nzg4ZDI2MTU0YSIsImlhdCI6MTc4MzQ5MDE4OCwiZXhwIjoyMDk4ODUwMTg4fQ.WqwBlvCxIUE36VZd82RHkVmV9Ep5s9uFJ95f7jAuWlY',
  ENTITY:'sensor.ecojoko_consommation_temps_reel'
};
const gid=id=>document.getElementById(id);
let pts=[];            /* [t(ms), W] */
let ws=null,msgId=1,drawPending=false;

/* ── Historique du jour via l'API REST ── */
async function loadHistory(){
  const d=new Date(); d.setHours(0,0,0,0);
  const url=CFG.HA_URL+'/api/history/period/'+d.toISOString()
    +'?filter_entity_id='+CFG.ENTITY+'&minimal_response&no_attributes';
  try{
    const r=await fetch(url,{headers:{Authorization:'Bearer '+CFG.HA_TOKEN}});
    if(!r.ok) return;
    const j=await r.json();
    const arr=(j&&j[0])?j[0]:[];
    pts=arr.map(x=>{
      const v=parseFloat(x.state ?? x.s);
      const t=new Date(x.last_changed ?? x.lc*1000 ?? x.lu*1000).getTime();
      return isNaN(v)||!t?null:[t,v];
    }).filter(Boolean);
    scheduleDraw();
  }catch(e){}
}

/* ── Temps réel ── */
function connectWS(){
  const url=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/api/websocket';
  ws=new WebSocket(url);
  ws.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    if(m.type==='auth_required')ws.send(JSON.stringify({type:'auth',access_token:CFG.HA_TOKEN}));
    else if(m.type==='auth_ok'){
      ws.send(JSON.stringify({id:msgId++,type:'subscribe_events',event_type:'state_changed'}));
    }
    else if(m.type==='event'&&m.event?.event_type==='state_changed'){
      const s=m.event.data.new_state;
      if(s&&s.entity_id===CFG.ENTITY){
        const v=parseFloat(s.state);
        if(!isNaN(v)){
          const t=Date.now();
          if(t-(pts.length?pts[pts.length-1][0]:0) < new Date().setHours(0,0,0,0)) pts=[]; /* minuit passé */
          pts.push([t,v]);
          gid('now').innerHTML=Math.round(v)+' <small>W</small>';
          scheduleDraw();
        }
      }
    }
  };
  ws.onclose=()=>setTimeout(connectWS,5000);
  ws.onerror=()=>ws.close();
}

/* ── Tracé canvas ── */
const cvs=gid('ch'), ctx=cvs.getContext('2d');
function scheduleDraw(){ if(!drawPending){drawPending=true;requestAnimationFrame(()=>{drawPending=false;draw();});} }

function draw(){
  const dpr=window.devicePixelRatio||1;
  const W=cvs.clientWidth, H=cvs.clientHeight;
  if(cvs.width!==W*dpr||cvs.height!==H*dpr){cvs.width=W*dpr;cvs.height=H*dpr;}
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const padL=64,padR=14,padT=12,padB=30;
  const iw=W-padL-padR, ih=H-padT-padB;
  const day0=new Date(); day0.setHours(0,0,0,0);
  const t0=day0.getTime(), t1=t0+86400000;

  /* Échelle Y auto, arrondie, incluant 0 */
  let vmin=0,vmax=500;
  pts.forEach(p=>{ if(p[1]<vmin)vmin=p[1]; if(p[1]>vmax)vmax=p[1]; });
  const step=vmax-vmin>4000?1000:500;
  vmax=Math.ceil(vmax/step)*step; vmin=Math.floor(vmin/step)*step;
  const X=t=>padL+(t-t0)/(t1-t0)*iw;
  const Y=v=>padT+(vmax-v)/(vmax-vmin)*ih;

  /* Grille */
  ctx.font='12px ui-monospace,Consolas,monospace';
  ctx.strokeStyle='rgba(85,103,127,.45)'; ctx.fillStyle='#aebdd0';
  ctx.setLineDash([3,5]); ctx.lineWidth=1;
  for(let v=vmin;v<=vmax;v+=step){
    ctx.beginPath();ctx.moveTo(padL,Y(v));ctx.lineTo(W-padR,Y(v));ctx.stroke();
    ctx.textAlign='right';ctx.fillText(v,padL-8,Y(v)+4);
  }
  ctx.setLineDash([]);
  ctx.textAlign='center';
  for(let h=0;h<=24;h+=2){
    const x=X(t0+h*3600000);
    ctx.fillText(String(h).padStart(2,'0')+':00',x,H-8);
  }
  /* Ligne zéro */
  ctx.strokeStyle='rgba(174,189,208,.5)';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(padL,Y(0));ctx.lineTo(W-padR,Y(0));ctx.stroke();

  if(pts.length<2) return;

  /* Sous-échantillonnage à ~2 points/pixel */
  const maxN=iw*2, stepN=Math.max(1,Math.floor(pts.length/maxN));
  const d=[]; for(let i=0;i<pts.length;i+=stepN) d.push(pts[i]);
  d.push(pts[pts.length-1]);

  /* Aire */
  ctx.beginPath();
  ctx.moveTo(X(d[0][0]),Y(0));
  d.forEach(p=>ctx.lineTo(X(p[0]),Y(p[1])));
  ctx.lineTo(X(d[d.length-1][0]),Y(0));
  ctx.closePath();
  const gr=ctx.createLinearGradient(0,padT,0,Y(0));
  gr.addColorStop(0,'rgba(125,219,154,.35)'); gr.addColorStop(1,'rgba(125,219,154,.04)');
  ctx.fillStyle=gr; ctx.fill();

  /* Ligne */
  ctx.beginPath();
  d.forEach((p,i)=>{ const x=X(p[0]),y=Y(p[1]); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
  ctx.strokeStyle='#7ddb9a'; ctx.lineWidth=1.8; ctx.lineJoin='round'; ctx.stroke();

  /* Point courant */
  const last=d[d.length-1];
  ctx.beginPath();ctx.arc(X(last[0]),Y(last[1]),4,0,7);ctx.fillStyle='#7ddb9a';ctx.fill();
}

window.addEventListener('resize',scheduleDraw);
setInterval(loadHistory,1800000);   /* re-synchronisation toutes les 30 min */
loadHistory(); connectWS(); scheduleDraw();
</script>
</body>
</html>
