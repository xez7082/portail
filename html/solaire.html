<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centrale solaire</title>
<style>
:root{
  --bg:#1c2431; --card:#27303f; --card2:#2f3a4c; --line:#3c4a5e; --txt:#eef3fa;
  --dim:#aebdd0; --dim2:#55677f; --accent:#4da3ff; --accent2:#a8d1ff;
  --ok:#3fae64; --okl:#7ddb9a; --warn:#f0b429; --bad:#ff6b62;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:ui-monospace,Consolas,"Segoe UI Mono",monospace;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin;padding:18px;gap:18px}

#hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
#hdr h1{font-size:clamp(17px,2.4vh,22px);letter-spacing:.14em;color:var(--accent2);font-weight:800}
#hdr .sub{font-size:13px;color:var(--dim);letter-spacing:.1em;margin-top:4px}
#live{font-size:14px;font-weight:800;color:var(--ok);display:flex;gap:8px;align-items:center}
#live .d{width:10px;height:10px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px rgba(63,174,100,.7)}

.panels{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.pan{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.pan .n{font-size:14px;font-weight:700;letter-spacing:.08em}
.pan .w{font-size:34px;font-weight:800;margin:6px 0 4px}
.pan .w small{font-size:15px;color:var(--dim)}
.pbar{height:5px;border-radius:3px;background:var(--card2);overflow:hidden;margin-bottom:8px}
.pbar div{height:100%;width:0%;border-radius:3px;transition:width .6s}
.pan .foot{display:flex;justify-content:space-between;font-size:13px;color:var(--dim)}

/* Flux */
#flow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;
  display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center}
.node .l{font-size:13px;letter-spacing:.14em;color:var(--dim);font-weight:700}
.node .v{font-size:clamp(34px,5vh,46px);font-weight:800}
.node .s{font-size:13px;color:var(--dim);margin-top:4px}
#mid{display:flex;flex-direction:column;gap:8px;align-items:center;min-width:0}
#auto-l{font-size:13px;letter-spacing:.14em;color:var(--okl);font-weight:800}
#pipe{width:100%;height:6px;border-radius:3px;background:var(--card2);position:relative;overflow:hidden}
#pipe .dash{position:absolute;inset:0;background:repeating-linear-gradient(90deg,var(--ok) 0 14px,transparent 14px 26px);
  animation:flow 1.1s linear infinite;opacity:.9}
@keyframes flow{to{transform:translateX(26px)}}
@media (prefers-reduced-motion:reduce){#pipe .dash{animation:none}}
#grid-l{font-size:14px;color:var(--dim)}
#grid-l.imp{color:var(--accent)} #grid-l.inj{color:var(--okl)}
@media (max-width:720px){#flow{grid-template-columns:1fr;text-align:center}.node .v{font-size:34px}}

/* Objectif */
#obj{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
#obj .hd{display:flex;justify-content:space-between;font-size:14px;font-weight:800;letter-spacing:.1em}
#obj .hd b{color:var(--okl)}
#obj .bar{height:12px;border-radius:6px;background:var(--card2);overflow:hidden}
#obj .bar div{height:100%;width:0%;border-radius:6px;background:linear-gradient(90deg,var(--ok),var(--warn));transition:width .6s}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.st{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.st .l{font-size:13px;color:var(--dim);letter-spacing:.12em;font-weight:700}
.st .v{font-size:26px;font-weight:800;margin-top:6px}
.st .v small{font-size:14px;color:var(--dim)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div>
      <h1>CENTRALE SOLAIRE — COMPLEXE SAINTE-CROIX</h1>
      <div class="sub">3 INSTALLATIONS · SURVEILLANCE TEMPS RÉEL</div>
    </div>
    <div id="live"><span class="d"></span>EN LIGNE</div>
  </div>

  <div class="panels" id="panels"></div>

  <div id="flow">
    <div class="node">
      <div class="l">PRODUCTION</div>
      <div class="v" style="color:var(--warn)"><span id="f-prod">--</span> <small style="font-size:16px;color:var(--dim)">W</small></div>
      <div class="s"><span id="f-day">--</span> kWh auj.</div>
    </div>
    <div id="mid">
      <div id="auto-l">AUTOCONSO <span id="f-auto">--</span>%</div>
      <div id="pipe"><div class="dash"></div></div>
      <div id="grid-l">Flux réseau…</div>
    </div>
    <div class="node" style="text-align:right">
      <div class="l">CONSOMMATION</div>
      <div class="v"><span id="f-cons">--</span> <small style="font-size:16px;color:var(--dim)">W</small></div>
      <div class="s"><span id="f-solpct">--</span>% solaire</div>
    </div>
  </div>

  <div id="obj">
    <div class="hd"><span>OBJECTIF MENSUEL</span><b><span id="o-pct">--</span>% — <span id="o-kwh">--</span>/<span id="o-max">--</span> kWh</b></div>
    <div class="bar"><div id="o-bar"></div></div>
  </div>

  <div class="stats">
    <div class="st"><div class="l">PROD. JOUR</div><div class="v" style="color:var(--warn)"><span id="s-day">--</span> <small>kWh</small></div></div>
    <div class="st"><div class="l">PROD. MOIS</div><div class="v" style="color:var(--okl)"><span id="s-month">--</span> <small>kWh</small></div></div>
    <div class="st"><div class="l">IMPORT RÉSEAU</div><div class="v" style="color:var(--accent)"><span id="s-grid">--</span> <small>W</small></div></div>
    <div class="st"><div class="l">CONSO NUIT</div><div class="v"><span id="s-night">--</span> <small>kWh</small></div></div>
  </div>
</div>

<script>
"use strict";
const CFG={
  HA_URL:location.origin, /* local + Nabu Casa */
  HA_TOKEN:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI1MTdmOWM3YWU1ZjE0MzZjYjNjYzQ2Nzg4ZDI2MTU0YSIsImlhdCI6MTc4MzQ5MDE4OCwiZXhwIjoyMDk4ODUwMTg4fQ.WqwBlvCxIUE36VZd82RHkVmV9Ep5s9uFJ95f7jAuWlY',
  PLANTS:[
    {n:'Maison (Sud)', col:'var(--warn)',   w:'sensor.beem_maison_puissance', d:'sensor.beem_maison_production_aujourd_hui', m:'sensor.beem_maison_production_du_mois', max:600},
    {n:'Spa',          col:'var(--okl)',    w:'sensor.beem_spa_puissance',    d:'sensor.beem_spa_production_aujourd_hui',    m:'sensor.beem_spa_production_du_mois',    max:800},
    {n:'IBC (Est)',    col:'var(--accent)', w:'sensor.ibc_puissance',         d:'sensor.ibc_production_aujourd_hui',         m:'sensor.ibc_production_du_mois',         max:420}
  ],
  TOTAL:'sensor.production_solaire_totale',
  CONS:'sensor.ecojoko_consommation_temps_reel',
  GRID:'sensor.ecojoko_consommation_reseau',
  AUTO:'sensor.taux_autoconsommation_reelle',
  DAY:'sensor.production_totale_beem_jour',
  MONTH:'sensor.beem_maison_production_du_mois',
  NIGHT:'sensor.conso_reseau_nuit_20h_8h',
  OBJ_PCT:'sensor.progression_objectif_solaire_mensuel',
  OBJ_KWH:'sensor.objectif_production_solaire_mensuel'
};

const gid=id=>document.getElementById(id);
const HA={}; let ws=null,msgId=1;
const num=e=>{const s=HA[e];const v=s?parseFloat(s.state):NaN;return isNaN(v)?null:v;};
const fmt=(v,d)=>v==null?'--':v.toFixed(d===undefined?0:d);

gid('panels').innerHTML=CFG.PLANTS.map((p,i)=>`
  <div class="pan">
    <div class="n" style="color:${p.col}">${p.n}</div>
    <div class="w" style="color:${p.col}"><span id="pw-${i}">--</span> <small>W</small></div>
    <div class="pbar"><div id="pb-${i}" style="background:${p.col}"></div></div>
    <div class="foot"><span><span id="pd-${i}">--</span> kWh/j</span><span><span id="pm-${i}">--</span> kWh/m</span></div>
  </div>`).join('');

function render(){
  CFG.PLANTS.forEach((p,i)=>{
    const w=num(p.w);
    gid('pw-'+i).textContent=fmt(w);
    gid('pb-'+i).style.width=(w==null?0:Math.min(100,w/p.max*100))+'%';
    gid('pd-'+i).textContent=fmt(num(p.d),1);
    gid('pm-'+i).textContent=fmt(num(p.m));
  });

  const prod=num(CFG.TOTAL), cons=num(CFG.CONS), grid=num(CFG.GRID), auto=num(CFG.AUTO);
  gid('f-prod').textContent=fmt(prod);
  gid('f-cons').textContent=fmt(cons);
  gid('f-day').textContent=fmt(num(CFG.DAY),1);
  gid('f-auto').textContent=fmt(auto);
  const solpct=(prod!=null&&cons!=null&&cons>0)?Math.min(100,prod/cons*100):null;
  gid('f-solpct').textContent=fmt(solpct);

  const gl=gid('grid-l');
  if(grid==null){gl.textContent='Flux réseau…';gl.className='';}
  else if(grid>10){gl.textContent='⬇ IMPORT RÉSEAU '+Math.round(grid)+' W';gl.className='imp';}
  else if(grid<-10){gl.textContent='⬆ INJECTION '+Math.round(-grid)+' W';gl.className='inj';}
  else{gl.textContent='Flux réseau nul';gl.className='';}

  const pipe=document.querySelector('#pipe .dash');
  pipe.style.opacity=(prod!=null&&prod>5)?'.9':'0';

  const opct=num(CFG.OBJ_PCT), omax=num(CFG.OBJ_KWH), okwh=num(CFG.MONTH);
  gid('o-pct').textContent=fmt(opct);
  gid('o-kwh').textContent=fmt(okwh,1);
  gid('o-max').textContent=fmt(omax);
  gid('o-bar').style.width=Math.max(0,Math.min(100,opct||0))+'%';

  gid('s-day').textContent=fmt(num(CFG.DAY),1);
  gid('s-month').textContent=fmt(num(CFG.MONTH));
  gid('s-grid').textContent=grid==null?'--':Math.max(0,Math.round(grid));
  gid('s-night').textContent=fmt(num(CFG.NIGHT),1);
}

function connectWS(){
  const url=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/api/websocket';
  ws=new WebSocket(url);
  ws.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    if(m.type==='auth_required')ws.send(JSON.stringify({type:'auth',access_token:CFG.HA_TOKEN}));
    else if(m.type==='auth_ok'){
      gid('live').style.opacity='1';
      ws.send(JSON.stringify({id:msgId++,type:'subscribe_events',event_type:'state_changed'}));
      ws.send(JSON.stringify({id:msgId++,type:'get_states'}));
    }
    else if(m.type==='result'&&Array.isArray(m.result)){
      m.result.forEach(s=>{HA[s.entity_id]=s;}); render();
    }
    else if(m.type==='event'&&m.event?.event_type==='state_changed'){
      const s=m.event.data.new_state; if(s){HA[s.entity_id]=s; render();}
    }
  };
  ws.onclose=()=>{gid('live').style.opacity='.35';setTimeout(connectWS,5000);};
  ws.onerror=()=>ws.close();
}
render(); connectWS();
</script>
</body>
</html>
