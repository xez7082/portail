<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreame L10s Pro Ultra Heat</title>
<style>
:root{
  --bg:#1c2431; --card:#27303f; --card2:#2f3a4c; --line:#3c4a5e; --txt:#eef3fa;
  --dim:#aebdd0; --dim2:#55677f; --accent:#4da3ff; --accent2:#a8d1ff;
  --ok:#3fae64; --okl:#7ddb9a; --warn:#f0b429; --bad:#ff6b62; --violet:#a5b4fc; --cyan:#22d3ee;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:ui-monospace,Consolas,"Segoe UI Mono",monospace;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;padding:14px;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;gap:12px 16px;overflow:hidden}
#hdr{grid-column:1/-1}
.colL,.colR{display:flex;flex-direction:column;gap:10px;min-height:0;overflow-y:auto;scrollbar-width:thin}
@media(max-width:760px){#app{grid-template-columns:1fr;grid-template-rows:auto auto auto;overflow-y:auto}}

#hdr{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
#hdr img{width:60px;height:60px;border-radius:14px;object-fit:contain;background:var(--card2);flex-shrink:0}
#hdr .n{font-size:21px;font-weight:800}
#hdr .m{font-size:14px;color:var(--dim);margin-top:2px}
#right{margin-left:auto;text-align:right}
#bat{font-size:22px;font-weight:800;color:var(--okl)}
#stat{font-size:17px;font-weight:800;letter-spacing:.08em;margin-top:4px}
#sub{font-size:13px;color:var(--dim2);margin-top:2px}

#room{display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px}
#room .l{font-size:14px;color:var(--dim);letter-spacing:.1em}
#room .v{font-size:18px;font-weight:800;color:var(--violet)}

.sect{font-size:13px;letter-spacing:.16em;color:var(--dim);font-weight:800}
#cons{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;
  display:flex;flex-direction:column;gap:10px}
.cr .hd{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
.cr .hd b{font-size:17px}
.bar{height:10px;border-radius:5px;background:var(--card2);overflow:hidden}
.bar div{height:100%;width:0%;border-radius:5px;transition:width .5s,background .4s}

#shorts,#rooms{display:flex;gap:10px;flex-wrap:wrap}
.sc{flex:1;min-width:180px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;
  border:2px solid var(--line);background:var(--card);color:var(--violet);border-radius:10px;
  padding:12px;min-height:50px}
.sc:hover{border-color:var(--violet)}
.rm{font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;
  border:2px solid var(--line);background:var(--card);color:var(--dim);border-radius:10px;
  padding:10px 14px;min-height:48px}
.rm:hover{border-color:var(--accent)}
.rm.sel{border-color:var(--okl);color:var(--okl);background:rgba(63,174,100,.1)}

#actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.ab{font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;border-radius:12px;
  padding:12px;min-height:52px;border:2px solid var(--line);background:var(--card)}
.ab:hover{filter:brightness(1.15)}
.ab.start{color:var(--okl);border-color:rgba(63,174,100,.5)}
.ab.pause{color:var(--violet)}
.ab.base{color:var(--cyan)}
.ab.loc{color:var(--warn)}
.ab.empty{color:var(--dim)}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#0f1724;
  border:2px solid var(--accent);color:#fff;font-size:15px;font-weight:700;
  padding:12px 20px;border-radius:10px;display:none;z-index:10}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <img src="/local/images/dreame_l10s.png" alt="Dreame L10s"
         onerror="this.style.display='none'">
    <div>
      <div class="n">Dreame</div>
      <div class="m">L10s Pro Ultra Heat — Walli · fw 1574</div>
    </div>
    <div id="right">
      <div id="bat">⚡ --%</div>
      <div id="stat">--</div>
      <div id="sub">&nbsp;</div>
    </div>
  </div>

  <div class="colL">
    <div id="room">
      <span class="l">PIÈCE EN COURS</span><span class="v" id="cur">--</span>
      <span class="l" style="margin-left:auto">MODE</span><span class="v" id="mode">--</span>
    </div>
    <div class="sect">// CONSOMMABLES</div>
    <div id="cons"></div>
  </div>

  <div class="colR">
    <div class="sect">// RACCOURCIS</div>
    <div id="shorts"></div>
    <div class="sect">// NETTOYER UNE PIÈCE (appui = sélection, puis DÉMARRER)</div>
    <div id="rooms"></div>
    <div class="sect">// COMMANDES</div>
    <div id="actions">
      <button class="ab start" onclick="doStart()">▶ DÉMARRER</button>
      <button class="ab pause" onclick="vac('pause')">⏸ PAUSE</button>
      <button class="ab base"  onclick="vac('return_to_base')">⌂ BASE</button>
      <button class="ab loc"   onclick="vac('locate')">📍 LOCALISER</button>
      <button class="ab empty" onclick="emptyBin()">🗑 VIDER BAC</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
"use strict";
const CFG={
  HA_URL:location.origin, /* local + Nabu Casa */
  HA_TOKEN:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI1MTdmOWM3YWU1ZjE0MzZjYjNjYzQ2Nzg4ZDI2MTU0YSIsImlhdCI6MTc4MzQ5MDE4OCwiZXhwIjoyMDk4ODUwMTg4fQ.WqwBlvCxIUE36VZd82RHkVmV9Ep5s9uFJ95f7jAuWlY',

  /* ── Entités réelles (vacuum.walli, intégration Tasshack) ── */
  VACUUM:'vacuum.walli',
  /* Consommables lus dans les attributs du vacuum */
  CONSUMABLES:[
    ['Brosse princ.','main_brush_left'],
    ['Brosse lat.','side_brush_left'],
    ['Filtre','filter_left'],
    ['Détergent','detergent_left'],
    ['Capteurs','sensor_dirty_left'],
    ['Patin (mop)','mop_pad_left']
  ],
  /* Raccourcis Dreame natifs (ids réels) */
  SHORTCUTS:[
    {label:'⊞ Shortcut Rez-de-chaussée', shortcut_id:32},
    {label:'⊞ Shortcut Cuisine', shortcut_id:33}
  ],
  AUTO_EMPTY_BUTTON:'button.walli_start_auto_empty',
  /* Pièces : ids réels de la carte Rez-de-chaussée */
  ROOMS:[
    {n:'Salle à manger', id:1},
    {n:'Salon', id:2},
    {n:'WC', id:3},
    {n:'Cuisine', id:4},
    {n:'Couloir', id:5}
  ],
  ROOM_FR:{'Dining Hall':'Salle à manger','Living Room':'Salon','WC':'WC','Kitchen':'Cuisine','Corridor':'Couloir'}
};

const STATES={cleaning:['NETTOYAGE','var(--okl)'],docked:['EN VEILLE','var(--okl)'],
  idle:['EN VEILLE','var(--okl)'],paused:['PAUSE','var(--violet)'],
  returning:['RETOUR BASE','var(--cyan)'],error:['ERREUR','var(--bad)'],
  unavailable:['INDISPONIBLE','var(--dim2)']};

const gid=id=>document.getElementById(id);
const HA={}; let ws=null,msgId=1,selRoom=null;
const num=e=>{const s=HA[e];const v=s?parseFloat(s.state):NaN;return isNaN(v)?null:v;};
const st=e=>{const s=HA[e]?HA[e].state:null;return(s==null||s==='unknown')?null:s;};
function toast(t){const e=gid('toast');e.textContent=t;e.style.display='block';
  clearTimeout(e._h);e._h=setTimeout(()=>e.style.display='none',2500);}
function call(domain,service,data){
  if(!ws||ws.readyState!==1){toast('Non connecté');return;}
  ws.send(JSON.stringify({id:msgId++,type:'call_service',domain,service,service_data:data}));
}

/* ── Construction ── */
gid('cons').innerHTML=CFG.CONSUMABLES.map((c,i)=>`
  <div class="cr">
    <div class="hd"><span>${c[0].toUpperCase()}</span><b id="cv-${i}">--%</b></div>
    <div class="bar"><div id="cb-${i}"></div></div>
  </div>`).join('');
gid('shorts').innerHTML=CFG.SHORTCUTS.map((s,i)=>
  `<button class="sc" onclick="shortcut(${i})">${s.label}</button>`).join('');
gid('rooms').innerHTML=CFG.ROOMS.map((r,i)=>
  `<button class="rm" id="rm-${i}" onclick="pick(${i})">○ ${r.n.toUpperCase()}</button>`).join('');

function pick(i){
  selRoom=selRoom===i?null:i;
  CFG.ROOMS.forEach((r,j)=>{
    const b=gid('rm-'+j);
    b.className='rm'+(j===selRoom?' sel':'');
    b.textContent=(j===selRoom?'✓ ':'○ ')+r.n.toUpperCase();
  });
}
function shortcut(i){
  const s=CFG.SHORTCUTS[i];
  call('dreame_vacuum','vacuum_start_shortcut',{entity_id:CFG.VACUUM,shortcut_id:s.shortcut_id});
  toast('Raccourci lancé ✔');
}
function vac(service){
  call('vacuum',service,{entity_id:CFG.VACUUM});
  toast('Commande envoyée ✔');
}
function doStart(){
  if(selRoom!=null){
    call('dreame_vacuum','vacuum_clean_segment',
      {entity_id:CFG.VACUUM,segments:[CFG.ROOMS[selRoom].id]});
    toast('Nettoyage : '+CFG.ROOMS[selRoom].n+' ▶');
  }else{
    vac('start');
  }
}
function emptyBin(){
  if(!confirm('Vider le bac à poussière maintenant ?'))return;
  call('button','press',{entity_id:CFG.AUTO_EMPTY_BUTTON});
  toast('Vidage lancé 🗑');
}

/* ── Rendu ── */
function render(){
  const v=HA[CFG.VACUUM];
  const A=v&&v.attributes?v.attributes:{};

  const b=A.battery_level!=null?A.battery_level:A.battery;
  const be=gid('bat');
  be.textContent='⚡ '+(b==null?'--':Math.round(b))+'%'+(A.charging?' ⚡':'');
  be.style.color=b==null?'var(--dim2)':b<=20?'var(--bad)':b<=50?'var(--warn)':'var(--okl)';

  const st0=v?v.state:'unavailable';
  const m=STATES[st0]||[String(st0).toUpperCase(),'var(--dim)'];
  const se=gid('stat'); se.textContent=m[0]; se.style.color=m[1];
  gid('sub').textContent=A.vacuum_state||A.status||'\u00a0';

  const room=CFG.ROOM_FR[
    (A.rooms&&A.selected_map&&A.rooms[A.selected_map]||[]).find(r=>r.id===A.current_segment)?.name
  ]||((A.rooms&&A.selected_map&&A.rooms[A.selected_map]||[]).find(r=>r.id===A.current_segment)?.name)||'--';
  const area=A.cleaned_area!=null?' · '+A.cleaned_area+' m²':'';
  gid('cur').textContent=room+area;
  gid('mode').textContent=A.suction_level||'--';

  CFG.CONSUMABLES.forEach((c,i)=>{
    const p=A[c[1]]!=null?parseFloat(A[c[1]]):null;
    gid('cv-'+i).textContent=p==null?'--%':Math.round(p)+'%';
    const f=gid('cb-'+i);
    f.style.width=(p==null?0:Math.max(0,Math.min(100,p)))+'%';
    f.style.background=p==null?'var(--dim2)':p<=20?'var(--bad)':p<=50?'var(--warn)':'var(--ok)';
  });
}

function connectWS(){
  const url=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/api/websocket';
  ws=new WebSocket(url);
  ws.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    if(m.type==='auth_required')ws.send(JSON.stringify({type:'auth',access_token:CFG.HA_TOKEN}));
    else if(m.type==='auth_ok'){
      ws.send(JSON.stringify({id:msgId++,type:'subscribe_events',event_type:'state_changed'}));
      ws.send(JSON.stringify({id:msgId++,type:'get_states'}));
    }
    else if(m.type==='result'&&Array.isArray(m.result)){
      m.result.forEach(x=>{HA[x.entity_id]=x;}); render();
    }
    else if(m.type==='event'&&m.event?.event_type==='state_changed'){
      const x=m.event.data.new_state; if(x){HA[x.entity_id]=x; render();}
    }
  };
  ws.onclose=()=>setTimeout(connectWS,5000);
  ws.onerror=()=>ws.close();
}
render(); connectWS();
</script>
</body>
</html>
