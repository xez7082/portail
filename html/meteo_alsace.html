<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Météo Alsace — Haut-Rhin</title>
<style>
:root{
  --bg:#1c2431; --card:#27303f; --card2:#2f3a4c; --line:#3c4a5e; --txt:#eef3fa;
  --dim:#aebdd0; --dim2:#55677f; --accent:#4da3ff; --accent2:#a8d1ff;
  --ok:#3fae64; --warn:#f0b429; --bad:#ff6b62;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:ui-monospace,Consolas,"Segoe UI Mono",monospace;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

#hdr{display:flex;align-items:center;justify-content:center;gap:18px;
  padding:12px 16px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--card)}
#hdr button{background:none;border:1px solid var(--line);border-radius:8px;color:var(--accent);
  font-size:22px;min-width:46px;min-height:46px;cursor:pointer;font-family:inherit}
#hdr button:hover{background:var(--card2);border-color:var(--accent)}
#slot-title{font-size:clamp(18px,2.6vh,26px);font-weight:800;letter-spacing:.22em;text-align:center;min-width:280px}

#cols{flex:1;display:grid;grid-template-columns:minmax(260px,34%) 1fr minmax(230px,26%);
  gap:0;min-height:0;overflow:hidden}
.col{padding:14px;overflow-y:auto;scrollbar-width:thin;min-width:0}
.col+.col{border-left:1px solid var(--line)}

/* ── Carte ── */
#map-col{display:flex;align-items:center;justify-content:center}
#map{width:100%;height:100%;max-height:100%}
.dept{fill:rgba(77,163,255,.06);stroke:var(--accent);stroke-width:2;stroke-linejoin:round}
.dept-name{fill:var(--dim2);font-size:20px;letter-spacing:.3em;font-weight:700}
.city-dot{fill:var(--accent2)}
.city-name{fill:var(--dim);font-size:10.5px;font-weight:700}
.city-temp{fill:#fff;font-size:14px;font-weight:800}

/* ── Centre ── */
.top-row{display:flex;gap:12px;margin-bottom:14px}
.uv-box{border:1px solid var(--warn);border-radius:10px;padding:12px 16px;text-align:center;flex-shrink:0}
.uv-box .l{font-size:13px;letter-spacing:.15em;color:var(--dim)}
.uv-box .v{font-size:30px;font-weight:800;color:var(--warn);margin-top:4px}
.temp-box{border:1px solid var(--line);border-radius:10px;background:var(--card);
  padding:12px 18px;display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.temp-box .big{font-size:clamp(30px,5vh,44px);font-weight:800}
.temp-box .sub{font-size:14px;color:var(--dim)}
.sun{width:38px;height:38px;color:var(--accent);flex-shrink:0}

.sect{font-size:13px;letter-spacing:.18em;color:var(--accent2);margin:6px 0 10px;font-weight:700}
#risks{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.risk{border-left:4px solid var(--ok);background:var(--card);border-radius:0 8px 8px 0;
  padding:12px 14px;display:flex;flex-direction:column;gap:7px;min-width:0}
.risk .n{font-size:14px;color:var(--dim);display:flex;align-items:center;gap:8px}
.risk .s{font-size:15px;font-weight:800;letter-spacing:.06em;color:var(--ok)}
.risk.warn{border-left-color:var(--warn);background:#33301f}
.risk.warn .s{color:var(--warn)}
.risk.bad{border-left-color:var(--bad);background:#3a2626}
.risk.bad .s{color:var(--bad)}

/* ── Allergies ── */
.glob{border:1px solid var(--bad);border-radius:10px;padding:12px 14px;margin-bottom:12px;
  display:flex;align-items:center;gap:10px}
.glob.ok{border-color:var(--ok)} .glob.warn{border-color:var(--warn)}
.pdot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.glob .gl{font-size:14px;color:var(--dim)}
.glob .gv{font-size:18px;font-weight:800;margin-left:auto}
#pollens{border:1px solid var(--line);border-radius:10px;background:var(--card);overflow:hidden}
.pol{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid var(--line)}
.pol:last-child{border-bottom:none}
.pol .pn{font-size:16px}
.pol .pv{margin-left:auto;font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px}

@media (max-width:860px){
  #cols{grid-template-columns:1fr;overflow-y:auto}
  .col{overflow:visible}
  .col+.col{border-left:none;border-top:1px solid var(--line)}
  #map{max-height:340px}
}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <button onclick="nav(-1)" aria-label="Créneau précédent">‹</button>
    <div id="slot-title">CHARGEMENT…</div>
    <button onclick="nav(1)" aria-label="Créneau suivant">›</button>
  </div>
  <div id="cols">
    <div class="col" id="map-col">
      <svg id="map" viewBox="0 0 300 460" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="col">
      <div class="top-row">
        <div class="uv-box"><div class="l">INDICE UV</div><div class="v" id="uv">–</div></div>
        <div class="temp-box">
          <svg class="sun" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7a5 5 0 1 0 5 5 5 5 0 0 0-5-5m0-5 2 3h-4Zm0 20-2-3h4ZM2 12l3-2v4Zm20 0-3 2v-4ZM4.9 4.9l3.5.7-2.8 2.8ZM19.1 19.1l-3.5-.7 2.8-2.8ZM19.1 4.9l-.7 3.5-2.8-2.8ZM4.9 19.1l.7-3.5 2.8 2.8Z"/></svg>
          <div style="min-width:0">
            <div class="big" id="t-big">--.-°C</div>
            <div class="sub" id="t-sub">↓--° ↑--° · -- km/h</div>
          </div>
        </div>
      </div>
      <div class="sect">◈ RISQUES DU CRÉNEAU</div>
      <div id="risks"></div>
    </div>
    <div class="col">
      <div class="sect">◈ RISQUE ALLERGIES</div>
      <div class="glob" id="glob">
        <span class="pdot" id="glob-dot" style="background:var(--dim2)"></span>
        <span class="gl">Indice global pollen</span>
        <span class="gv" id="glob-v">–</span>
      </div>
      <div id="pollens"></div>
    </div>
  </div>
</div>

<script>
"use strict";
const CFG={
  HA_URL:location.origin, /* local + Nabu Casa */
  HA_TOKEN:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI1MTdmOWM3YWU1ZjE0MzZjYjNjYzQ2Nzg4ZDI2MTU0YSIsImlhdCI6MTc4MzQ5MDE4OCwiZXhwIjoyMDk4ODUwMTg4fQ.WqwBlvCxIUE36VZd82RHkVmV9Ep5s9uFJ95f7jAuWlY',
  WEATHER:'weather.sainte_croix_en_plaine',
  LOCAL:'sensor.tdeg_cabane_temperature',
  UV:'sensor.colmar_uv',
  GLOB:'sensor.qualite_globale_pollen_sainte_croix_en_plaine',
  POLLENS:[
    ['Graminées','sensor.niveau_gramine_sainte_croix_en_plaine'],
    ['Bouleau','sensor.niveau_bouleau_sainte_croix_en_plaine'],
    ['Ambroisie','sensor.niveau_ambroisie_sainte_croix_en_plaine'],
    ['Aulne','sensor.niveau_aulne_sainte_croix_en_plaine'],
    ['Armoise','sensor.niveau_armoise_sainte_croix_en_plaine'],
    ['Olivier','sensor.niveau_olivier_sainte_croix_en_plaine']
  ],
  CITIES:[
    {name:'Ribeauvillé', lat:48.1951, lon:7.3194, e:'weather.ribeauville'},
    {name:'Munster',     lat:48.0500, lon:7.1333, e:'weather.munster'},
    {name:'Guebwiller',  lat:47.9167, lon:7.2000, e:'weather.guebwiller'},
    {name:'Colmar',      lat:48.0833, lon:7.3667, e:'weather.colmar'},
    {name:'Ste-Croix-en-Pl.', lat:48.009, lon:7.405, e:'sensor.tdeg_cabane_temperature', sensor:true},
    {name:'Mulhouse',    lat:47.7500, lon:7.3360, e:'weather.mulhouse'},
    {name:'Thann',       lat:47.8167, lon:7.0833, e:'weather.thann'},
    {name:'Sewen',       lat:47.8000, lon:6.9000, e:'weather.sewen'}
  ]
};

/* Contour simplifié du Haut-Rhin (lat,lon) */
const DEPT=[[48.31,7.43],[48.26,7.55],[48.12,7.58],[47.95,7.60],[47.75,7.55],[47.60,7.59],
  [47.53,7.51],[47.45,7.43],[47.42,7.25],[47.46,7.10],[47.52,6.99],[47.56,6.86],
  [47.68,6.90],[47.78,6.86],[47.88,6.92],[47.98,6.98],[48.06,7.02],[48.14,7.08],
  [48.22,7.18],[48.28,7.30]];
const LAT=[47.40,48.33], LON=[6.82,7.64];
function proj(lat,lon){
  const x=(lon-LON[0])/(LON[1]-LON[0])*280+10;
  const y=(LAT[1]-lat)/(LAT[1]-LAT[0])*440+10;
  return [x,y];
}

/* ── État ── */
const ST={states:{},forecast:[],slot:0};
const gid=id=>document.getElementById(id);
const DAYS=['DIMANCHE','LUNDI','MARDI','MERCREDI','JEUDI','VENDREDI','SAMEDI'];

/* ── Carte ── */
function drawMap(){
  const svg=gid('map');
  const pts=DEPT.map(p=>proj(p[0],p[1]).map(v=>v.toFixed(1)).join(',')).join(' ');
  let h=`<polygon class="dept" points="${pts}"/>`;
  h+=`<text class="dept-name" x="60" y="250">HAUT-RHIN</text>`;
  CFG.CITIES.forEach((c,i)=>{
    const [x,y]=proj(c.lat,c.lon);
    h+=`<circle class="city-dot" cx="${x}" cy="${y}" r="4"/>`;
    h+=`<text class="city-name" x="${x+7}" y="${y-4}">${c.name}</text>`;
    h+=`<text class="city-temp" id="ct-${i}" x="${x+7}" y="${y+13}">--.-°</text>`;
  });
  svg.innerHTML=h;
}
function updCities(){
  CFG.CITIES.forEach((c,i)=>{
    const s=ST.states[c.e]; if(!s) return;
    let t=c.sensor?parseFloat(s.state):parseFloat(s.attributes?.temperature);
    gid('ct-'+i).textContent=isNaN(t)?'--.-°':t.toFixed(2)+'°';
  });
}

/* ── Créneaux ── */
function slots(){
  const out=[{title:'MAINTENANT',cur:true,f:ST.forecast[0]||null}];
  ST.forecast.forEach((f,i)=>{
    const d=new Date(f.datetime); const day=DAYS[d.getDay()];
    if(i===0){ out.push({title:day+" APRÈS-MIDI",f,part:'pm'}); }
    else{ out.push({title:day+' MATIN',f,part:'am'}); out.push({title:day+' APRÈS-MIDI',f,part:'pm'}); }
  });
  return out;
}
function nav(d){
  const s=slots(); ST.slot=Math.max(0,Math.min(s.length-1,ST.slot+d)); render();
}

/* ── Risques ── */
const RISKS=[
  {n:'Grand froid',ic:'🌡'},{n:'Canicule',ic:'☀'},
  {n:'Pluie-inondation',ic:'🌊'},{n:'Neige/Grêle',ic:'❄'},
  {n:'Verglas',ic:'🛞'},{n:'Tempête/arbres',ic:'🌲'},
  {n:'Vent violent',ic:'💨'},{n:'Orage',ic:'⛈'}
];
function lvl(v){return v===0?['PAS DE RISQUE','']:v===1?['RISQUE FAIBLE','warn']:['RISQUE ÉLEVÉ','bad'];}
function evalRisks(f,tempNow){
  const t=f? (f.temperature??tempNow) : tempNow;
  const tl=f? (f.templow??t) : t;
  const rain=f? (f.precipitation||0):0;
  const wind=f? (f.wind_speed||0):0;
  const cond=String(f?.condition||'');
  const r=[0,0,0,0,0,0,0,0];
  if(tl<=-8)r[0]=2; else if(tl<=-4)r[0]=1;
  if(t>=34)r[1]=2; else if(t>=30)r[1]=1;
  if(rain>=20)r[2]=2; else if(rain>=8)r[2]=1;
  if(/snowy|hail/.test(cond))r[3]=(rain>=5?2:1);
  if(tl<=1&&rain>0)r[4]=1; if(tl<=-1&&rain>2)r[4]=2;
  if(wind>=85)r[5]=2; else if(wind>=65)r[5]=1;
  if(wind>=75)r[6]=2; else if(wind>=50)r[6]=1;
  if(/lightning/.test(cond))r[7]=2; else if(/pouring/.test(cond))r[7]=1;
  return r;
}

/* ── Pollens ── */
function polColor(state){
  const s=String(state).toLowerCase(); const n=parseFloat(state);
  if(/très faible|tres faible|^0$|^1$/.test(s)||n<=1)return['var(--ok)','ok'];
  if(/faible|^2$/.test(s)||n===2)return['var(--ok)','ok'];
  if(/moyen|modéré|modere|^3$/.test(s)||n===3)return['var(--warn)','warn'];
  return['var(--bad)','bad'];
}
function updPollens(){
  const g=ST.states[CFG.GLOB];
  if(g){
    const[c,cls]=polColor(g.state);
    gid('glob-dot').style.background=c; gid('glob-v').textContent=g.state;
    gid('glob-v').style.color=c; gid('glob').className='glob '+cls;
  }
  let h='';
  CFG.POLLENS.forEach(([n,e])=>{
    const s=ST.states[e]; const v=s?s.state:'–';
    const[c]=polColor(v);
    h+=`<div class="pol"><span class="pn">${n}</span>
        <span class="pv" style="color:${c}"><span class="pdot" style="background:${c}"></span>${String(v).toUpperCase()}</span></div>`;
  });
  gid('pollens').innerHTML=h;
}

/* ── Rendu ── */
function render(){
  const sl=slots(); if(ST.slot>=sl.length)ST.slot=0;
  const s=sl[ST.slot]||sl[0];
  gid('slot-title').textContent=s.title;

  const w=ST.states[CFG.WEATHER], loc=ST.states[CFG.LOCAL];
  const tempNow=loc?parseFloat(loc.state):NaN;
  const f=s.f;

  let big,lo,hi,wind;
  if(s.cur){
    big=isNaN(tempNow)?(w?w.attributes.temperature:NaN):tempNow;
    lo=f?.templow; hi=f?.temperature; wind=w?w.attributes.wind_speed:f?.wind_speed;
  }else{
    big=s.part==='am'?(f.templow??f.temperature):f.temperature;
    lo=f.templow; hi=f.temperature; wind=f.wind_speed;
  }
  gid('t-big').textContent=(big!=null&&!isNaN(big))?Number(big).toFixed(2)+'°C':'--.-°C';
  gid('t-sub').textContent='↓'+(lo!=null?Math.round(lo):'--')+'° ↑'+(hi!=null?Math.round(hi):'--')+'° · '+(wind!=null?Math.round(wind):'--')+' km/h';

  const uv=ST.states[CFG.UV];
  gid('uv').textContent=uv&&!isNaN(parseFloat(uv.state))?Math.round(parseFloat(uv.state)):'–';

  const rv=evalRisks(f,big);
  gid('risks').innerHTML=RISKS.map((r,i)=>{
    const[txt,cls]=lvl(rv[i]);
    return`<div class="risk ${cls}"><div class="n"><span>${r.ic}</span>${r.n}</div><div class="s">${txt}</div></div>`;
  }).join('');

  updCities(); updPollens();
}

/* ── WebSocket ── */
let ws=null,msgId=1;
function connectWS(){
  ws=new WebSocket(CFG.HA_URL.replace('http','ws')+'/api/websocket');
  ws.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    if(m.type==='auth_required')ws.send(JSON.stringify({type:'auth',access_token:CFG.HA_TOKEN}));
    else if(m.type==='auth_ok'){
      ws.send(JSON.stringify({id:msgId++,type:'subscribe_events',event_type:'state_changed'}));
      ws.send(JSON.stringify({id:msgId++,type:'get_states'}));
      subForecast();
    }
    else if(m.type==='result'&&Array.isArray(m.result)){
      m.result.forEach(s=>{ST.states[s.entity_id]=s;}); render();
    }
    else if(m.type==='event'&&m.event?.forecast){
      ST.forecast=m.event.forecast; render();
    }
    else if(m.type==='event'&&m.event?.event_type==='state_changed'){
      const s=m.event.data.new_state; if(s){ST.states[s.entity_id]=s; render();}
    }
  };
  ws.onclose=()=>setTimeout(connectWS,5000);
  ws.onerror=()=>ws.close();
}
let fcSub=null;
function subForecast(){
  fcSub=msgId++;
  ws.send(JSON.stringify({id:fcSub,type:'weather/subscribe_forecast',entity_id:CFG.WEATHER,forecast_type:'daily'}));
  /* renouvellement toutes les 30 min pour rester léger */
  setTimeout(()=>{ if(ws&&ws.readyState===1){ws.send(JSON.stringify({id:msgId++,type:'unsubscribe_events',subscription:fcSub}));subForecast();} },1800000);
}

drawMap();
connectWS();
</script>
</body>
</html>
