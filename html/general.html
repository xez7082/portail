<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spa - Général</title>
<style>
:root{
  --bg:#161c28;--card:#1e2736;--card2:#273040;--line:#354258;--txt:#f4f7fc;
  --dim:#9aabb8;--dim2:#5a6e82;--accent:#5cb0ff;--accent2:#b8d8ff;
  --ok:#4ec472;--warn:#f5c342;--bad:#ff7b73;--water:#5dffa8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;display:flex;padding:16px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;gap:14px}

.gen-top{display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 16px;flex-shrink:0}
.top-left{display:flex;align-items:center;gap:12px}
#conn{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;
  letter-spacing:.04em;pointer-events:none;transition:all .3s;flex-shrink:0}
#conn.on{background:rgba(63,174,100,0.15);color:var(--ok);border:1px solid rgba(63,174,100,0.3)}
#conn.off{background:rgba(255,107,98,0.15);color:var(--bad);border:1px solid rgba(255,107,98,0.3)}
#conn.err{background:rgba(255,107,98,0.25);color:var(--bad);border:1px solid rgba(255,107,98,0.4)}
#conn.ing{background:rgba(240,180,41,0.15);color:var(--warn);border:1px solid rgba(240,180,41,0.3)}
#gen-status{background:var(--card2);border:1px solid var(--line);padding:6px 14px;border-radius:20px;
  font-size:13px;font-weight:700;color:var(--dim);transition:all .3s;cursor:pointer;user-select:none}
#gen-status:hover{border-color:var(--accent);color:var(--txt)}
#gen-status.heating{color:var(--bad);background:#3a2222;border-color:rgba(255,123,115,0.35)}
#gen-status.heating:hover{border-color:var(--bad);color:var(--bad)}
.gen-tgt-ctrl{display:flex;align-items:center;gap:14px;font-family:ui-monospace,Consolas,monospace;font-size:22px;font-weight:800;margin-left:auto}
.gbtn{background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer;padding:0 8px;transition:color .15s}
.gbtn:hover{color:var(--txt)}

.gen-mid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px;margin:8px 0}
.side-meas{display:flex;flex-direction:column;gap:3px}
.side-meas.left{align-items:flex-start;text-align:left}
.side-meas.right{align-items:flex-end;text-align:right}
.side-meas .lbl{font-size:11px;font-weight:800;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
.side-meas .val{font-size:28px;font-weight:800;font-family:ui-monospace,Consolas,monospace}
.badge-hr{background:var(--card);border:1px solid var(--line);padding:3px 10px;border-radius:12px;
  font-size:11px;color:var(--dim);margin-top:4px;text-align:center}
.badge-hr b{display:block;font-size:13px;color:var(--txt);font-family:ui-monospace,Consolas,monospace}

.circle-container{display:flex;flex-direction:column;align-items:center;gap:10px;position:relative}
.circle-ring{width:160px;height:160px;border-radius:50%;border:2px dashed var(--line);
  display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;background:var(--card)}
.circle-ring .lbl{font-size:11px;font-weight:800;color:var(--dim);letter-spacing:.1em}
.circle-ring .main-val{font-size:32px;font-weight:800;color:var(--water);font-family:ui-monospace,Consolas,monospace}
.circle-ring .sub-val{font-size:12px;color:var(--dim);font-weight:700;margin-top:2px}
.circle-arrow{background:var(--card);border:1px solid var(--line);width:28px;height:28px;border-radius:50%;
  display:flex;justify-content:center;align-items:center;cursor:pointer;color:var(--dim);font-size:12px;transition:all .15s}
.circle-arrow:hover{border-color:var(--accent);color:var(--txt)}

.pow-badges{display:flex;gap:10px;justify-content:center;flex-shrink:0}
.p-badge{background:var(--card);border:1px solid var(--line);padding:6px 14px;border-radius:8px;
  font-size:13px;font-weight:700;font-family:ui-monospace,Consolas,monospace;display:flex;align-items:center;gap:6px}

.maint-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex-shrink:0}
.maint-card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 16px;
  display:flex;flex-direction:column;gap:8px}
.maint-hd{display:flex;justify-content:space-between;align-items:center}
.maint-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;color:var(--dim)}
.maint-val{font-family:ui-monospace,Consolas,monospace;font-size:14px;color:var(--txt)}
.maint-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.maint-fill{height:100%;width:0%;background:var(--ok);border-radius:3px;transition:width .5s,background .4s}
.maint-btn{background:none;border:1px solid var(--line);color:var(--dim);width:22px;height:22px;border-radius:4px;
  cursor:pointer;display:flex;justify-content:center;align-items:center;font-size:12px;transition:all .15s}
.maint-btn:hover{border-color:var(--ok);color:var(--ok)}

.sec-strip{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;transition:border-color .3s}
.sec-strip.alert{border-color:rgba(255,107,98,0.4)}
.sec-status{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--ok);transition:color .3s}
.sec-strip.alert .sec-status{color:var(--bad)}
.sec-bat{font-family:ui-monospace,Consolas,monospace;font-size:13px;color:var(--dim);display:flex;align-items:center;gap:6px}

.err-banner{background:rgba(255,107,98,0.1);border:1px solid rgba(255,107,98,0.25);border-radius:8px;
  padding:10px 16px;margin-bottom:12px;display:none;align-items:center;gap:8px;font-size:13px;color:var(--bad);flex-shrink:0}
.err-banner.show{display:flex}
.err-banner i{font-size:16px}

#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1a2233;
  border:2px solid var(--accent);color:#fff;font-size:15px;font-weight:700;padding:12px 20px;border-radius:10px;display:none;z-index:10}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div id="app">
<div id="main">
    <div class="err-banner" id="errBanner">
      <i class="fas fa-exclamation-triangle"></i>
      <span id="errMsg">Connexion en cours...</span>
    </div>

    <div class="gen-top">
      <div class="top-left">
        <span id="conn" class="ing">CONNEXION...</span>
        <button id="gen-status" onclick="toggleHeat()">░ Chargement...</button>
      </div>
      <div class="gen-tgt-ctrl">
        <button class="gbtn" onclick="stepTarget(-0.5)">−</button>
        <span id="g-tgt-val">--</span>°
        <button class="gbtn" onclick="stepTarget(0.5)">+</button>
      </div>
    </div>

    <div class="gen-mid">
      <div class="side-meas left">
        <span class="val" id="g-extt">--.-°</span>
        <span class="lbl">Extérieur</span>
        <div class="badge-hr">HR <b id="g-exth">--%</b></div>
      </div>
      <div class="circle-container">
        <button class="circle-arrow" onclick="stepTarget(0.5)">▲</button>
        <div class="circle-ring">
          <span class="lbl">EAU</span>
          <span class="main-val" id="g-watert">--.-°</span>
          <span class="sub-val">CIBLE <span id="g-tgt-sub">--</span>°</span>
        </div>
        <button class="circle-arrow" onclick="stepTarget(-0.5)">▼</button>
      </div>
      <div class="side-meas right">
        <span class="val" id="g-airt">--.-°</span>
        <span class="lbl">Air Spa</span>
        <div class="badge-hr">HR <b id="g-airh">--%</b></div>
      </div>
    </div>

    <div class="pow-badges">
      <div class="p-badge">⚡ <span id="g-pw">--</span> W</div>
      <div class="p-badge">⚡ <span id="g-en">--</span> kWh</div>
    </div>

    <div class="maint-grid">
      <div class="maint-card">
        <div class="maint-hd">
          <span class="maint-title">🛁 Filtre</span>
          <span class="maint-val"><span id="g-fil">--</span> j / 3 j</span>
          <button class="maint-btn" onclick="resetTimer('button.layzspa_reset_filter_change_timer','filtre')">✓</button>
        </div>
        <div class="maint-bar"><div class="maint-fill" id="g-filb"></div></div>
      </div>
      <div class="maint-card">
        <div class="maint-hd">
          <span class="maint-title">🧪 Chlore</span>
          <span class="maint-val"><span id="g-chl">--</span> j / 13 j</span>
          <button class="maint-btn" onclick="resetTimer('button.layzspa_reset_chlorine_timer','chlore')">✓</button>
        </div>
        <div class="maint-bar"><div class="maint-fill" id="g-chlb"></div></div>
      </div>
    </div>

    <div class="sec-strip" id="g-sec-strip">
      <div class="sec-status" id="g-sec-txt">✓ Sécurité OK</div>
      <div class="sec-bat">🔋 <span id="g-bat">--</span>%</div>
    </div>
</div>
<div id="toast"></div>
</div>

<script>
window.onerror=function(m,s,l,c,e){var d=document.getElementById('errBanner'),t=document.getElementById('errMsg');if(d&&t){t.textContent='JS Error line '+l+': '+m;d.classList.add('show');}};
"use strict";
const CFG={
  HA_URL: location.protocol==='https:' ? 'https://'+location.host : 'http://'+location.host,
  HA_TOKEN:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI4ZjFjNTRlZDRhYzQ0ZTM3YjczM2M4MDEyZjI1NThkYSIsImlhdCI6MTc3Nzc5NzIwNSwiZXhwIjoyMDkzMTU3MjA1fQ.YiyhAHNjm-lgSH67KZ-qmp-mlSsy2zZbHowjH6dCsbk',
  WATER:'sensor.water_quality_temperature',
  CLIMATE:'climate.layzspa_temperature_control',T_MIN:20,T_MAX:40,
  HEATER:'binary_sensor.layzspa_heater',
  AIR_T:'sensor.tdeg_spa_temperature',AIR_H:'sensor.tdeg_spa_humidity',
  EXT_T:'sensor.tdeg_cabane_temperature',EXT_H:'sensor.tdeg_cabane_humidity',
  POWER:'sensor.layzspa_power',ENERGY:'sensor.layzspa_energy',
  FILTER:'sensor.layzspa_filter_age',FILTER_MAX:3,FILTER_RESET:'button.layzspa_reset_filter_change_timer',
  CHLORE:'sensor.layzspa_chlorine_age',CHLORE_MAX:13,CHLORE_RESET:'button.layzspa_reset_chlorine_timer',
  LEAK:'binary_sensor.innondation_spa_water_leak',TAMPER:'binary_sensor.innondation_spa_tamper',
  FLOOD_BAT:'sensor.innondation_spa_battery'
};

const gid=id=>document.getElementById(id);
const HA={};let ws=null,msgId=1,tries=0;

const num=e=>{const s=HA[e];const v=s?parseFloat(s.state):NaN;return isNaN(v)?null:v;};
const st=e=>HA[e]?HA[e].state:null;

function toast(t){const e=gid('toast');e.textContent=t;e.style.display='block';clearTimeout(e._t);e._t=setTimeout(()=>e.style.display='none',2500);}
function call(d,s,data){if(!ws||ws.readyState!==1){toast('Non connecté');return;}ws.send(JSON.stringify({id:msgId++,type:'call_service',domain:d,service:s,service_data:data}));}

function setConn(c){const e=gid('conn');e.className=c;
  e.textContent=c==='on'?'CONNECTÉ':c==='ing'?'CONNEXION...':c==='err'?'ERREUR':'HORS LIGNE';}

function showErr(msg){
  const b=gid('errBanner'),m=gid('errMsg');
  if(b&&m){m.textContent=msg;b.classList.add('show');}
}

function hideErr(){const b=gid('errBanner');if(b)b.classList.remove('show');}

function ageRow(idV,idB,e,max){
  const v=num(e),el=gid(idV);if(!el)return;
  el.textContent=v==null?'--':v.toFixed(0);
  const p=v==null?0:Math.max(0,Math.min(100,v/max*100));
  const f=gid(idB);
  if(f){f.style.width=p+'%';f.style.background=p>=100?'var(--bad)':p>=75?'var(--warn)':'var(--ok)';}
}

function render(){
  hideErr();

  const wv=num(CFG.WATER),cl=HA[CFG.CLIMATE];
  const target=cl&&cl.attributes?parseFloat(cl.attributes.temperature):null;

  const tv=gid('g-tgt-val'),ts=gid('g-tgt-sub');
  if(tv)tv.textContent=target==null?'--':target.toFixed(0);
  if(ts)ts.textContent=target==null?'--':target.toFixed(0);
  const wt=gid('g-watert');
  if(wt)wt.textContent=wv==null?'--.-°':wv.toFixed(2)+'°';

  const eT=num(CFG.EXT_T),eH=num(CFG.EXT_H),aT=num(CFG.AIR_T),aH=num(CFG.AIR_H);
  if(gid('g-extt'))gid('g-extt').textContent=eT==null?'--.-°':eT.toFixed(2)+'°';
  if(gid('g-exth'))gid('g-exth').textContent=eH==null?'--%':eH.toFixed(2)+'%';
  if(gid('g-airt'))gid('g-airt').textContent=aT==null?'--.-°':aT.toFixed(2)+'°';
  if(gid('g-airh'))gid('g-airh').textContent=aH==null?'--%':aH.toFixed(2)+'%';

  const pw=num(CFG.POWER),en=num(CFG.ENERGY);
  if(gid('g-pw'))gid('g-pw').textContent=pw==null?'--':pw.toFixed(0);
  if(gid('g-en'))gid('g-en').textContent=en==null?'--':en.toFixed(2);

  ageRow('g-fil','g-filb',CFG.FILTER,CFG.FILTER_MAX);
  ageRow('g-chl','g-chlb',CFG.CHLORE,CFG.CHLORE_MAX);

  const leak=st(CFG.LEAK)==='on',tamper=st(CFG.TAMPER)==='on';
  const strip=gid('g-sec-strip'),stxt=gid('g-sec-txt');
  if(strip&&stxt){
    if(leak){strip.className='sec-strip alert';stxt.textContent='⚠ FUITE D\'EAU !';}
    else if(tamper){strip.className='sec-strip alert';stxt.textContent='⚠ SABOTAGE SONDE !';}
    else{strip.className='sec-strip';stxt.textContent='✓ Sécurité OK';}
  }
  const bat=num(CFG.FLOOD_BAT);
  if(gid('g-bat'))gid('g-bat').textContent=bat==null?'--':bat.toFixed(0);

  const heaterOn=st(CFG.HEATER)==='on';
  const se=gid('gen-status');
  if(se){
    if(heaterOn){
      se.className='heating';
      se.textContent='♨ Chauffe en cours — cliquer pour éteindre';
    }else{
      se.className='';
      se.textContent='░ Chauffe OFF — cliquer pour allumer';
    }
  }
}

window.stepTarget=function(d){
  const cl=HA[CFG.CLIMATE];
  if(!cl||!cl.attributes){toast('Entité climate introuvable');return;}
  const cur=parseFloat(cl.attributes.temperature);
  if(isNaN(cur)){toast('Consigne inconnue');return;}
  const lo=parseFloat(cl.attributes.min_temp)||CFG.T_MIN;
  const hi=parseFloat(cl.attributes.max_temp)||CFG.T_MAX;
  const step=parseFloat(cl.attributes.target_temp_step)||1;
  const raw=Math.round((cur+d*step)/step)*step;
  if(raw<lo||raw>hi){toast('Limite : '+lo+'° – '+hi+'°');return;}
  var data={entity_id:CFG.CLIMATE,temperature:raw};
  if(d>0) data.hvac_mode='heat';
  call('climate','set_temperature',data);
  toast('Consigne → '+raw.toFixed(0)+' °C');
};

window.toggleHeat=function(){
  const heaterOn=st(CFG.HEATER)==='on';
  call('climate','set_hvac_mode',{entity_id:CFG.CLIMATE,hvac_mode:heaterOn?'off':'heat'});
  toast(heaterOn?'Chauffe éteinte':'Chauffe allumée');
};

window.resetTimer=function(e,label){
  if(!confirm('Remettre '+label+' à zéro ?'))return;
  call('button','press',{entity_id:e});toast(label+' remis à zéro ✔');
};

function connectWS(){
  tries++;
  setConn('ing');
  showErr('Connexion au serveur...');
  try{ws=new WebSocket(CFG.HA_URL.replace(/^http/,'ws')+'/api/websocket');}
  catch(e){setConn('err');showErr('WebSocket indisponible');setTimeout(connectWS,10000);return;}

  ws.onopen=()=>{
    ws.send(JSON.stringify({type:'auth',access_token:CFG.HA_TOKEN}));
  };

  ws.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    if(m.type==='auth_ok'){
      setConn('on');
      hideErr();
      ws.send(JSON.stringify({id:msgId++,type:'subscribe_events',event_type:'state_changed'}));
      ws.send(JSON.stringify({id:msgId++,type:'get_states'}));
    }
    else if(m.type==='auth_invalid'){
      setConn('err');
      showErr('Token invalide — génère-en un nouveau dans Outils de développement → JWT Token');
      toast('Token invalide');
      ws.close();
      return;
    }
    else if(m.type==='result'&&Array.isArray(m.result)){
      m.result.forEach(s=>{HA[s.entity_id]=s;});render();
    }
    else if(m.type==='event'&&m.event?.data){
      const s=m.event.data.new_state;
      if(s){HA[s.entity_id]=s;render();}
    }
  };

  ws.onclose=()=>{
    setConn('off');
    showErr('Connexion perdue — reconnexion dans 10s...');
    setTimeout(connectWS,10000);
  };

  ws.onerror=()=>{
    setConn('err');
    ws.close();
  };
}

try{connectWS();}catch(e){showErr('Erreur démarrage: '+e.message);setConn('err');}
</script>
</body>
</html>
