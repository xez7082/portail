<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caméra</title>
<style>
:root{
  --bg:#1c2431; --card:#27303f; --line:#3c4a5e; --txt:#eef3fa;
  --dim:#aebdd0; --dim2:#55677f; --accent:#4da3ff; --ok:#3fae64; --bad:#ff6b62;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column}

#bar{display:flex;align-items:center;gap:12px;padding:10px 16px;
  background:var(--card);border-bottom:1px solid var(--line);flex-shrink:0}
#nm{font-size:18px;font-weight:800;letter-spacing:.08em}
.dot{width:11px;height:11px;border-radius:50%;background:var(--dim2)}
.dot.on{background:var(--ok);box-shadow:0 0 8px rgba(63,174,100,.7)}
.dot.err{background:var(--bad);box-shadow:0 0 8px rgba(255,107,98,.7)}
#clk{margin-left:auto;font-family:ui-monospace,Consolas,monospace;font-size:17px;color:var(--dim)}
#fit{background:none;border:1px solid var(--line);border-radius:8px;color:var(--dim);
  font-size:14px;font-weight:700;padding:8px 12px;min-height:40px;cursor:pointer;font-family:inherit}
#fit:hover{border-color:var(--accent);color:var(--accent)}

#view{flex:1;position:relative;background:#000;min-height:0}
#cam{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
#cam.cover{object-fit:cover}
#msg{position:absolute;inset:0;display:flex;flex-direction:column;gap:10px;
  align-items:center;justify-content:center;text-align:center;padding:20px;
  font-size:17px;color:var(--dim);background:rgba(28,36,49,.85)}
#msg.hide{display:none}
.sp{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);
  border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.sp{animation:none}}
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <span class="dot" id="dot"></span>
    <span id="nm">CAMÉRA</span>
    <button id="fit" onclick="toggleFit()">AJUSTER</button>
    <span id="clk">--:--:--</span>
  </div>
  <div id="view">
    <img id="cam" alt="Flux caméra">
    <div id="msg"><div class="sp"></div><span id="msg-t">Connexion à la caméra…</span></div>
  </div>
</div>

<script>
"use strict";
const CFG={
  HA_URL:location.origin,
  HA_TOKEN:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI1MTdmOWM3YWU1ZjE0MzZjYjNjYzQ2Nzg4ZDI2MTU0YSIsImlhdCI6MTc4MzQ5MDE4OCwiZXhwIjoyMDk4ODUwMTg4fQ.WqwBlvCxIUE36VZd82RHkVmV9Ep5s9uFJ95f7jAuWlY',
  REFRESH_MS:1500,
  SHORTCUTS:{
    carport:   ['camera.carsport_prof0_name',                 'CARPORT'],
    garage_ext:['camera.exterieur_garage_exterieur_profile_1_2','ENTRÉE GARAGE'],
    entree:    ['camera.entre_terrasse_fluide',               'ENTRÉE PRINCIPALE'],
    terrasse:  ['camera.ipc_bo_profile000_mainstream',        'GRANDE TERRASSE'],
    garage_int:['camera.garage_interieur_prof0_name',         'GARAGE INTÉRIEUR'],
    sous_terrasse:['camera.sous_terrasse_prof1_name',         'SOUS-TERRASSE'],
    salon:     ['camera.salon_prof0_name',                    'SALON'],
    spa:       ['camera.camera_spa_substream',                'SPA']
  }
};

const q=new URLSearchParams(location.search);
let ENTITY=q.get('e')||'', NAME=q.get('n')||'';
const sc=CFG.SHORTCUTS[q.get('cam')||''];
if(sc){ ENTITY=ENTITY||sc[0]; NAME=NAME||sc[1]; }
if(!ENTITY){ ENTITY='camera.carsport_prof0_name'; NAME=NAME||'CARPORT'; }
if(!NAME) NAME=ENTITY.replace('camera.','').replace(/_/g,' ').toUpperCase();

const gid=id=>document.getElementById(id);
gid('nm').textContent=NAME; document.title='Caméra — '+NAME;

let ws=null,msgId=1,camToken='',refreshTimer=null,loading=false;

function setMsg(t){ gid('msg').className=''; gid('msg-t').textContent=t; }
function hideMsg(){ gid('msg').className='hide'; }
function setDot(c){ gid('dot').className='dot '+c; }

function applyStream(){
  if(!camToken) return;
  const src=CFG.HA_URL+'/api/camera_proxy_stream/'+ENTITY+'?token='+encodeURIComponent(camToken)+'&_t='+Date.now();
  const img=gid('cam');
  loading=true;
  img.onload=()=>{ loading=false; hideMsg(); setDot('on'); };
  img.onerror=()=>{ loading=false; setDot('err'); setMsg('Flux interrompu'); };
  img.src=src;
}

function handleState(st){
  if(!st||st.entity_id!==ENTITY) return;
  if(st.state==='unavailable'){ setDot('err'); setMsg('Caméra indisponible'); return; }
  const t=st.attributes&&st.attributes.access_token;
  if(t&&t!==camToken){ camToken=t; applyStream(); }
}

/* ── REST : appel direct, très rapide ── */
async function fetchInitialState(){
  try{
    const r=await fetch(CFG.HA_URL+'/api/states/'+ENTITY,{
      headers:{'Authorization':'Bearer '+CFG.HA_TOKEN}
    });
    if(!r.ok) throw new Error(r.status);
    handleState(await r.json());
  }catch(e){
    setDot('err'); setMsg('Chargement échoué — attente WS…');
  }
}

/* ── WebSocket : pour les mises à jour en temps réel ── */
function connectWS(){
  ws=new WebSocket(CFG.HA_URL.replace('http','ws')+'/api/websocket');
  ws.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    if(m.type==='auth_required') ws.send(JSON.stringify({type:'auth',access_token:CFG.HA_TOKEN}));
    else if(m.type==='auth_ok'){
      ws.send(JSON.stringify({id:msgId++,type:'subscribe_events',event_type:'state_changed'}));
    }
    else if(m.type==='event'&&m.event?.event_type==='state_changed'){
      handleState(m.event.data.new_state);
    }
  };
  ws.onclose=()=>{ setTimeout(connectWS,5000); };
  ws.onerror=()=>ws.close();
}

/* ── Auto-refresh du flux ── */
function startRefresh(){
  if(refreshTimer) return;
  refreshTimer=setInterval(()=>{
    if(camToken&&!document.hidden&&!loading) applyStream();
  },CFG.REFRESH_MS);
}

document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&camToken) applyStream();
});

function toggleFit(){
  const img=gid('cam'), b=gid('fit');
  img.classList.toggle('cover');
  b.textContent=img.classList.contains('cover')?'ENTIER':'AJUSTER';
}

setInterval(()=>{
  const n=new Date();
  gid('clk').textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
},1000);

/* ── Démarrage parallèle : REST (rapide) + WS (persistent) ── */
fetchInitialState();
connectWS();
startRefresh();
</script>
</body>
</html>
