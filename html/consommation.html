<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consommation</title>
<style>
:root{
  --bg:#1c2431; --card:#27303f; --card2:#2f3a4c; --line:#3c4a5e; --txt:#eef3fa;
  --dim:#aebdd0; --dim2:#55677f; --accent:#4da3ff; --accent2:#a8d1ff;
  --ok:#3fae64; --okl:#7ddb9a; --warn:#f0b429; --bad:#ff6b62;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:ui-monospace,Consolas,"Segoe UI Mono",monospace;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;
  overflow-y:auto;scrollbar-width:thin;padding:18px;gap:16px}

#hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
#hdr h1{font-size:clamp(16px,2.3vh,21px);letter-spacing:.14em;color:var(--bad);font-weight:800}
#hdr .sub{font-size:13px;color:var(--dim);letter-spacing:.1em;margin-top:4px}
#tarif{font-size:14px;font-weight:800;color:var(--warn);border:1px solid rgba(240,180,41,.5);
  border-radius:8px;padding:8px 14px}

#top{display:grid;grid-template-columns:1fr auto;gap:16px}
@media(max-width:760px){#top{grid-template-columns:1fr}}
#main{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;
  display:flex;flex-direction:column;gap:12px;justify-content:center}
#main .l{font-size:14px;letter-spacing:.16em;color:var(--bad);font-weight:800}
#main .big{font-size:clamp(52px,10vh,80px);font-weight:800;color:var(--bad);line-height:1}
#main .big small{font-size:.35em;color:var(--dim)}
#cap{height:12px;border-radius:6px;background:var(--card2);overflow:hidden}
#cap div{height:100%;width:0%;border-radius:6px;background:linear-gradient(90deg,var(--ok),var(--warn),var(--bad));transition:width .5s}
#caplbl{display:flex;justify-content:space-between;font-size:13px;color:var(--dim)}
#cappct{font-weight:800;color:var(--txt)}

#side{display:flex;flex-direction:column;gap:12px;min-width:210px}
.sd{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px}
.sd .l{font-size:12px;letter-spacing:.14em;font-weight:700;color:var(--dim)}
.sd .v{font-size:26px;font-weight:800;margin-top:6px}

#toplist{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;
  display:flex;flex-direction:column;gap:12px}
#toplist h2{font-size:14px;letter-spacing:.14em;font-weight:800;color:var(--accent2)}
#devs{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px 24px}
.dev{display:flex;align-items:center;gap:10px;font-size:15px;padding:6px 0;border-bottom:1px solid rgba(60,74,94,.5)}
.dev .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dev .n{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.dev .w{margin-left:auto;font-weight:800;white-space:nowrap}
#empty{color:var(--dim2);font-size:14px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div>
      <h1>SURVEILLANCE ÉNERGÉTIQUE — RÉSIDENCE</h1>
      <div class="sub">LINKY + ECOJOKO · CAPTEURS ACTIFS</div>
    </div>
    <div id="tarif">TARIF EDF · <span id="tv">--</span> €/kWh</div>
  </div>

  <div id="top">
    <div id="main">
      <div class="l">CONSOMMATION INSTANTANÉE</div>
      <div class="big"><span id="cons">--</span> <small>W</small></div>
      <div id="cap"><div id="cap-f"></div></div>
      <div id="caplbl"><span>0 W</span><span id="cappct">--% DE LA CAPACITÉ</span><span>5 kW</span></div>
    </div>
    <div id="side">
      <div class="sd"><div class="l">COÛT / HEURE</div><div class="v" style="color:var(--bad)" id="cost">-- €</div></div>
      <div class="sd"><div class="l">SOLAIRE ACTUEL</div><div class="v" style="color:var(--okl)" id="sol">-- W</div></div>
      <div class="sd"><div class="l">CONSO NUIT</div><div class="v" style="color:var(--warn)" id="night">-- kWh</div></div>
    </div>
  </div>

  <div id="toplist">
    <h2 id="toph">TOP CONSOMMATEURS ACTIFS — 0 / 0 UNITÉS</h2>
    <div id="devs"></div>
    <div id="empty" style="display:none">Aucun appareil au-dessus de 5 W actuellement.</div>
  </div>
</div>

<script>
"use strict";
const CFG={
  HA_URL:location.origin, /* local + Nabu Casa */
  HA_TOKEN:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI1MTdmOWM3YWU1ZjE0MzZjYjNjYzQ2Nzg4ZDI2MTU0YSIsImlhdCI6MTc4MzQ5MDE4OCwiZXhwIjoyMDk4ODUwMTg4fQ.WqwBlvCxIUE36VZd82RHkVmV9Ep5s9uFJ95f7jAuWlY',
  TOTAL:'sensor.ecojoko_consommation_temps_reel',
  SOLAR:'sensor.production_solaire_totale',
  NIGHT:'sensor.conso_reseau_nuit_20h_8h',
  TARIF:'sensor.tarif_actuel_base_9kva_ttc', TARIF_FALLBACK:0.1927,
  MAX_W:5000, THRESHOLD:5, TOP:18,
  DEVICES:[
    ['sensor.television_salon_power','TV Salon','#818cf8'],
    ['sensor.barre_son_power','Barre son','#818cf8'],
    ['sensor.alexa_sejour_power','Alexa Séjour','#818cf8'],
    ['sensor.prise_camera_salon_power','Caméra Salon','#94a3b8'],
    ['sensor.prise_ecran_power','Écran','#818cf8'],
    ['sensor.micro_onde_power','Micro-onde','#f59e0b'],
    ['sensor.delonghi_power','DeLonghi','#f59e0b'],
    ['sensor.kenwood_power','Kenwood','#f59e0b'],
    ['sensor.ninja_cream_power','Ninja Creami','#f59e0b'],
    ['sensor.soda_stream_power','SodaStream','#f59e0b'],
    ['sensor.ninja_air_fryer_power','Air-fryer','#f59e0b'],
    ['sensor.owon_power_l1','Four (L1)','#ff6b62'],
    ['sensor.owon_power_l2','Plaque (L2)','#ff6b62'],
    ['sensor.owon_power_l3','Clim-réversible (L3)','#ff6b62'],
    ['sensor.lave_linge_puissance','Lave-linge','#22d3ee'],
    ['sensor.lave_vaisselle_power','Lave-vaisselle','#22d3ee'],
    ['sensor.refrigerateur_power','Réfrigérateur','#22d3ee'],
    ['sensor.congelateur_power','Congélateur','#22d3ee'],
    ['sensor.prise_chauffe_eau_power','Chauffe-eau','#ff6b62'],
    ['sensor.prise_cave_a_vins_power','Cave à vins','#818cf8'],
    ['sensor.server_ha_power','Serveur HA','#3fae64'],
    ['sensor.prise_serveur_truenas_power','TrueNAS','#3fae64'],
    ['sensor.prise_ordinateur_power','PC (Patrick)','#3fae64'],
    ['sensor.prise_ordinateur_freder_power','PC (Freder)','#3fae64'],
    ['sensor.prise_imprimante_3d_power','Imprimante 3D','#3fae64'],
    ['sensor.spa_power','Spa','#4da3ff'],
    ['sensor.aspirateur_spa_power','Asp. Spa','#4da3ff'],
    ['sensor.camera_spa_power','Caméra Spa','#94a3b8'],
    ['sensor.television_spa_power','TV Spa','#818cf8'],
    ['sensor.alexa_pop_spa_power','Alexa Spa','#818cf8'],
    ['sensor.analyseur_d_eau_spa_power','Analyseur eau','#4da3ff'],
    ['sensor.plug_l10s_power','Dreame L10s','#3fae64'],
    ['sensor.prise_pompe_power','Pompe','#38bdf8'],
    ['sensor.carsport_power','Carsport','#94a3b8'],
    ['sensor.prise_etagere_power','Étagère','#94a3b8'],
    ['sensor.prise_vitrine_power','Vitrine','#94a3b8'],
    ['sensor.prise_chevet_franck_power','Chevet Franck','#818cf8'],
    ['sensor.prise_chevet_maman_power','Chevet Maman','#818cf8'],
    ['sensor.prise_chevet_papa_power','Chevet Papa','#818cf8'],
    ['sensor.television_chambre_parents_power','TV Parents','#818cf8'],
    ['sensor.prise_reveil_power','Réveil','#818cf8'],
    ['sensor.camera_garage_power','Caméra Garage','#94a3b8'],
    ['sensor.prise_camera_garage_power','Cam. Garage 2','#94a3b8'],
    ['sensor.prise_chargeur_power','Chargeur','#f59e0b'],
    ['sensor.chargeur_batterie_power','Charg. Batterie','#f59e0b'],
    ['sensor.perceuse_colonne_power','Perceuse','#f59e0b'],
    ['sensor.scie_sous_table_power','Scie s-table','#f59e0b'],
    ['sensor.scie_radial_power','Scie radiale','#f59e0b'],
    ['sensor.prise_1_power','Prise 1','#94a3b8'],
    ['sensor.prise_2_power','Prise 2','#94a3b8']
  ]
};

const gid=id=>document.getElementById(id);
const HA={}; let ws=null,msgId=1;
const num=e=>{const s=HA[e];const v=s?parseFloat(s.state):NaN;return isNaN(v)?null:v;};
const fr=(v,d)=>v==null?'--':v.toFixed(d).replace('.',',');

function render(){
  const total=num(CFG.TOTAL), sol=num(CFG.SOLAR), night=num(CFG.NIGHT);
  const tarif=num(CFG.TARIF)||CFG.TARIF_FALLBACK;

  gid('tv').textContent=fr(tarif,3);
  gid('cons').textContent=total==null?'--':Math.round(total);
  const pct=total==null?0:Math.max(0,Math.min(100,total/CFG.MAX_W*100));
  gid('cap-f').style.width=pct+'%';
  gid('cappct').textContent=(total==null?'--':Math.round(pct))+'% DE LA CAPACITÉ';
  gid('cost').textContent=total==null?'-- €':fr(Math.max(0,total)/1000*tarif,2)+' €';
  gid('sol').textContent=sol==null?'-- W':Math.round(sol)+' W';
  gid('night').textContent=night==null?'-- kWh':fr(night,1)+' kWh';

  const act=CFG.DEVICES
    .map(d=>({n:d[1],c:d[2],w:num(d[0])}))
    .filter(d=>d.w!=null&&d.w>=CFG.THRESHOLD)
    .sort((a,b)=>b.w-a.w)
    .slice(0,CFG.TOP);
  gid('toph').textContent='TOP CONSOMMATEURS ACTIFS — '+act.length+' / '+CFG.DEVICES.length+' UNITÉS';
  gid('devs').innerHTML=act.map(d=>`
    <div class="dev"><span class="dot" style="background:${d.c}"></span>
    <span class="n">${d.n}</span><span class="w" style="color:${d.c}">${Math.round(d.w)} W</span></div>`).join('');
  gid('empty').style.display=act.length?'none':'block';
}

function connectWS(){
  const url=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/api/websocket';
  ws=new WebSocket(url);
  ws.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    if(m.type==='auth_required')ws.send(JSON.stringify({type:'auth',access_token:CFG.HA_TOKEN}));
    else if(m.type==='auth_ok'){
      ws.send(JSON.stringify({id:msgId++,type:'subscribe_events',event_type:'state_changed'}));
      ws.send(JSON.stringify({id:msgId++,type:'get_states'}));
    }
    else if(m.type==='result'&&Array.isArray(m.result)){
      m.result.forEach(s=>{HA[s.entity_id]=s;}); render();
    }
    else if(m.type==='event'&&m.event?.event_type==='state_changed'){
      const s=m.event.data.new_state; if(s){HA[s.entity_id]=s; render();}
    }
  };
  ws.onclose=()=>setTimeout(connectWS,5000);
  ws.onerror=()=>ws.close();
}
render(); connectWS();
</script>
</body>
</html>
