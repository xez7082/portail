<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sous-sol (Laboratoire)</title>
<style>
:root{
  --bg:#1c2431; --card:#27303f; --card2:#2f3a4c; --line:#3c4a5e; --txt:#eef3fa;
  --dim:#aebdd0; --dim2:#55677f; --accent:#4da3ff; --accent2:#a8d1ff;
  --ok:#3fae64; --warn:#f0b429; --bad:#ff6b62;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column}

#top{display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--line);background:var(--card);flex-shrink:0;flex-wrap:wrap}
#title{font-size:20px;font-weight:800;letter-spacing:.06em;margin-right:auto}
#status{font-size:14px;color:var(--dim);display:flex;align-items:center;gap:8px}
.sdot{width:10px;height:10px;border-radius:50%;background:var(--dim2)}
.sdot.on{background:var(--ok);box-shadow:0 0 8px rgba(63,174,100,.7)}

#tabs{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap;flex-shrink:0}
.tab{font-size:16px;font-weight:700;color:var(--dim);background:none;
  border:2px solid var(--line);border-radius:10px;padding:12px 18px;min-height:52px;cursor:pointer;font-family:inherit}
.tab:hover{border-color:var(--accent);color:var(--accent2)}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.tab .n{background:rgba(255,255,255,.16);border-radius:8px;padding:2px 8px;margin-left:6px;font-size:13px}

#grid{flex:1;overflow-y:auto;scrollbar-width:thin;padding:4px 16px 16px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;align-content:start}
.tile{background:var(--card);border:2px solid var(--line);border-radius:14px;
  padding:16px 14px;display:flex;flex-direction:column;gap:8px;min-height:130px;
  text-align:center;align-items:center;justify-content:center;position:relative}
.tile.click{cursor:pointer}
.tile.click:hover{border-color:var(--accent2)}
.tile.click:active{transform:scale(.98)}
.tile .ic{font-size:34px;line-height:1}
.tile .ic svg{width:38px;height:38px;color:var(--accent2);display:block}
.tile .nm{font-size:16px;font-weight:700;line-height:1.25}
.tile .st{font-size:15px;font-weight:800;letter-spacing:.04em;color:var(--dim2)}
.tile .st.big{font-size:26px;font-family:ui-monospace,Consolas,monospace;color:var(--accent2)}

.tile.on{border-color:var(--accent);background:#26364d}
.tile.on .st{color:var(--accent2)}
.tile.open{border-color:var(--warn);background:#33301f}
.tile.open .st{color:var(--warn)}
.tile.alert{border-color:var(--bad);background:#3a2626}
.tile.alert .st{color:var(--bad)}
.tile.safe .st{color:var(--ok)}
.tile.unav{opacity:.45}
@media(max-width:480px){#grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<div id="app">
  <div id="top">
    <div id="title">🔧 SOUS-SOL (LABORATOIRE)</div>
    <div id="status"><span class="sdot" id="sdot"></span><span id="stxt">Connexion…</span></div>
  </div>
  <div id="tabs"></div>
  <div id="grid"></div>
</div>

<script>
"use strict";
const CFG={
  HA_URL:location.origin, /* local + Nabu Casa */
  HA_TOKEN:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI1MTdmOWM3YWU1ZjE0MzZjYjNjYzQ2Nzg4ZDI2MTU0YSIsImlhdCI6MTc4MzQ5MDE4OCwiZXhwIjoyMDk4ODUwMTg4fQ.WqwBlvCxIUE36VZd82RHkVmV9Ep5s9uFJ95f7jAuWlY',
  TITLE:'🔧 SOUS-SOL (LABORATOIRE)',
  TABS:[
    ['all','TOUT'],['lights','ÉCLAIRAGES'],['switches','PRISES'],
    ['binarys','OUVERTURES'],['security','SÉCURITÉ'],['climates','TEMPÉRATURES']
  ],
  SENSORS:[
    {e:'light.led_scie_radial',                  n:'LED scie radiale',     i:'✨', t:'lights'},
    {e:'switch.interrupteur_salle_impression_3d',n:'Salle impression 3D',  i:'💡', t:'lights'},
    {e:'switch.led_etabli_do_not_disturb',       n:'LED établi',           i:'✨', t:'lights'},
    {e:'switch.interrupteur_etabli',             n:'Établi',               i:'💡', svg:'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="9" y="3.5" width="6" height="3.2" rx="1"/><rect x="11" y="1.8" width="2" height="2.4" rx="1"/><rect x="2" y="7.5" width="20" height="3" rx="1"/><rect x="4" y="10.5" width="2.4" height="9"/><rect x="17.6" y="10.5" width="2.4" height="9"/><rect x="4" y="13.5" width="16" height="1.6"/></svg>', t:'lights'},
    {e:'switch.interrupteur_garage_right',       n:'Garage (droite)',      i:'💡', t:'lights'},
    {e:'switch.interrupteur_garage_left',        n:'Garage (gauche)',      i:'💡', t:'lights'},
    {e:'switch.congelateur',            n:'Congélateur',      i:'🧊', t:'switches'},
    {e:'switch.prise_chauffe_eau',      n:'Chauffe-eau',      i:'♨️', t:'switches'},
    {e:'switch.prise_ordinateur_freder',n:'Ordinateur Fréder',i:'💻', t:'switches'},
    {e:'switch.prise_ecran',            n:'Écran',            i:'🖥️', t:'switches'},
    {e:'switch.prise_chargeur',         n:'Chargeur',         i:'⚡', t:'switches'},
    {e:'switch.prise_cave_a_vins',      n:'Cave à vins',      i:'🍷', t:'switches'},
    {e:'switch.prise_imprimante_3d',    n:'Imprimante 3D',    i:'🖨️', t:'switches'},
    {e:'switch.prise_serveur_windows',  n:'Serveur Windows',  i:'🗄️', t:'switches'},
    {e:'switch.perceuse_colonne',       n:'Perceuse colonne', i:'🛠️', svg:'<svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="2" width="3" height="20" rx="1"/><rect x="3" y="20" width="14" height="2.2" rx="1"/><rect x="3" y="2" width="10" height="2.2" rx="1"/><rect x="8.5" y="6.5" width="9" height="5" rx="1.2"/><rect x="17.5" y="7.8" width="3" height="2.4" rx="1"/><rect x="11.6" y="11.5" width="1.8" height="4.5"/><path d="M11.4 16h2.2l-1.1 2.6Z"/></svg>', t:'switches'},
    {e:'switch.lave_linge',             n:'Lave-linge',       i:'🧺', t:'switches'},
    {e:'switch.camera_garage',          n:'Caméra garage',    i:'📹', t:'switches'},
    {e:'switch.prise_pompe',            n:'Pompe',            i:'💧', t:'switches'},
    {e:'switch.scie_radial',            n:'Scie radiale',     i:'🪚', svg:'<svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2l1.8 2.6 3-.9.3 3.1 3.1.3-.9 3L22 12l-2.6 1.8.9 3-3.1.3-.3 3.1-3-.9L12 22l-1.8-2.6-3 .9-.3-3.1-3.1-.3.9-3L2 12l2.6-1.8-.9-3 3.1-.3.3-3.1 3 .9Z"/><circle cx="12" cy="12" r="4.4" fill="var(--card)"/><circle cx="12" cy="12" r="1.7" fill="currentColor"/></svg>', t:'switches'},
    {e:'switch.prise_1',                n:'Prise 1',          i:'🔌', t:'switches'},
    {e:'switch.prise_2',                n:'Prise 2',          i:'🔌', t:'switches'},
    {e:'switch.chargeur_batterie',      n:'Chargeur batterie',i:'🔋', t:'switches'},
    {e:'binary_sensor.fenetre_chambre_frederick_contact',      n:'Fenêtre Frédérick', i:'🪟', t:'binarys'},
    {e:'binary_sensor.porte_salle_impression_3d_contact',      n:'Porte salle 3D',    i:'🚪', t:'binarys'},
    {e:'binary_sensor.fenetre_salle_d_impression_3d_contact',  n:'Fenêtre salle 3D',  i:'🪟', t:'binarys'},
    {e:'binary_sensor.porte_jardin_contact',                   n:'Porte jardin',      i:'🚪', t:'binarys'},
    {e:'binary_sensor.detecteur_de_fumee_garage_smoke', n:'Détecteur fumée garage', i:'🚨', t:'security', k:'smoke'},
    {e:'binary_sensor.detecteur_garage_1_occupancy',    n:'Détecteur garage 1',     i:'👁️', t:'security', k:'motion'},
    {e:'binary_sensor.detecteur_garage_2_occupancy',    n:'Détecteur garage 2',     i:'👁️', t:'security', k:'motion'},
    {e:'sensor.tdeg_garage_temperature',            n:'Garage',            i:'🌡️', t:'climates'},
    {e:'sensor.tdeg_chambre_frederick_temperature', n:'Chambre Frédérick', i:'🌡️', t:'climates'},
    {e:'sensor.tdeg_sous_terrasse_temperature',     n:'Sous terrasse',     i:'🌡️', t:'climates'}
  ]
};

const gid=id=>document.getElementById(id);
gid('title').textContent=CFG.TITLE;
const ST={}; let tab='all', ws=null, msgId=1;

/* ── Onglets ── */
function renderTabs(){
  gid('tabs').innerHTML=CFG.TABS.map(([id,n])=>{
    const c=id==='all'?CFG.SENSORS.length:CFG.SENSORS.filter(s=>s.t===id).length;
    return `<button class="tab${tab===id?' on':''}" onclick="setTab('${id}')">${n}<span class="n">${c}</span></button>`;
  }).join('');
}
function setTab(id){tab=id;renderTabs();renderGrid();}

/* ── Tuiles ── */
function tileState(s){
  const st=ST[s.e], v=st?st.state:'unavailable';
  if(v==='unavailable'||v==='unknown') return {cls:'unav',txt:'INDISPONIBLE',click:false};
  if(s.t==='lights'||s.t==='switches'){
    return {cls:v==='on'?'on':'', txt:v==='on'?'ALLUMÉ':'ÉTEINT', click:true};
  }
  if(s.t==='binarys'){
    return {cls:v==='on'?'open':'safe', txt:v==='on'?'OUVERT':'FERMÉ', click:false};
  }
  if(s.t==='security'){
    if(v!=='on') return {cls:'safe', txt:'R.A.S.', click:false};
    return s.k==='smoke'
      ? {cls:'alert', txt:'⚠ FUMÉE !', click:false}
      : {cls:'open',  txt:'MOUVEMENT', click:false};
  }
  if(s.t==='climates'){
    const t=parseFloat(v);
    return {cls:'', txt:(isNaN(t)?'--':t.toFixed(1))+' °C', big:true, click:false};
  }
  return {cls:'',txt:v,click:false};
}
function renderGrid(){
  const list=CFG.SENSORS.map((s,i)=>({...s,idx:i})).filter(s=>tab==='all'||s.t===tab);
  gid('grid').innerHTML=list.map(s=>{
    const x=tileState(s);
    return `<div class="tile ${x.cls}${x.click?' click':''}" ${x.click?`onclick="toggle(${s.idx})"`:''}
      role="${x.click?'button':'group'}" ${x.click?'tabindex="0"':''} aria-label="${s.n}">
      <div class="ic">${s.svg||s.i}</div>
      <div class="nm">${s.n}</div>
      <div class="st${x.big?' big':''}">${x.txt}</div>
    </div>`;
  }).join('');
}
function toggle(i){
  const s=CFG.SENSORS[i]; if(!s||!ws||ws.readyState!==1) return;
  ws.send(JSON.stringify({id:msgId++,type:'call_service',domain:'homeassistant',service:'toggle',service_data:{entity_id:s.e}}));
}

/* ── WebSocket ── */
function connectWS(){
  ws=new WebSocket(CFG.HA_URL.replace('http','ws')+'/api/websocket');
  ws.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    if(m.type==='auth_required')ws.send(JSON.stringify({type:'auth',access_token:CFG.HA_TOKEN}));
    else if(m.type==='auth_ok'){
      gid('sdot').className='sdot on'; gid('stxt').textContent='En ligne';
      ws.send(JSON.stringify({id:msgId++,type:'subscribe_events',event_type:'state_changed'}));
      ws.send(JSON.stringify({id:msgId++,type:'get_states'}));
    }
    else if(m.type==='result'&&Array.isArray(m.result)){
      m.result.forEach(s=>{ST[s.entity_id]=s;}); renderGrid();
    }
    else if(m.type==='event'&&m.event?.event_type==='state_changed'){
      const s=m.event.data.new_state;
      if(s&&CFG.SENSORS.some(x=>x.e===s.entity_id)){ST[s.entity_id]=s;renderGrid();}
    }
  };
  ws.onclose=()=>{gid('sdot').className='sdot';gid('stxt').textContent='Reconnexion…';setTimeout(connectWS,5000);};
  ws.onerror=()=>ws.close();
}

renderTabs(); renderGrid(); connectWS();
</script>
</body>
</html>
