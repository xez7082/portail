<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spa — Programmation</title>
<style>
:root{
  --bg:#1c2431;--card:#27303f;--card2:#2f3a4c;--line:#3c4a5e;--txt:#eef3fa;
  --dim:#aebdd0;--dim2:#55677f;--accent:#4da3ff;--accent2:#a8d1ff;
  --ok:#3fae64;--warn:#f0b429;--bad:#ff6b62;--water:#4da3ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column}

#bar{display:flex;align-items:center;gap:14px;padding:12px 18px;
  background:var(--card);border-bottom:1px solid var(--line);flex-shrink:0}
#ttl{font-size:20px;font-weight:800;letter-spacing:.05em}
#bar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
#wt{font-family:ui-monospace,Consolas,monospace;font-size:22px;font-weight:800;color:var(--water)}
#wt small{font-size:14px;color:var(--dim);font-weight:600}
#conn{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:700;
  letter-spacing:.04em;pointer-events:none;transition:all .3s;flex-shrink:0}
#conn.on{background:rgba(63,174,100,0.15);color:var(--ok);border:1px solid rgba(63,174,100,0.3)}
#conn.off{background:rgba(255,107,98,0.15);color:var(--bad);border:1px solid rgba(255,107,98,0.3)}
#conn.ing{background:rgba(240,180,41,0.15);color:var(--warn);border:1px solid rgba(240,180,41,0.3)}

#body{flex:1;overflow:hidden;padding:16px 20px;
  display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr auto auto;gap:12px;align-content:start}

.prow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;gap:12px}
.prow .l{font-size:15px;color:var(--dim);font-weight:700}
.prow .v{font-size:26px;font-weight:800;font-family:ui-monospace,Consolas,monospace;color:var(--accent2)}

.result{grid-column:1/3;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.ri{text-align:center;display:flex;flex-direction:column;gap:4px}
.ri .rl{font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.ri .rv{font-size:28px;font-weight:800;font-family:ui-monospace,Consolas,monospace;color:var(--accent2)}
.ri.hl .rv{color:var(--water)}
.ri.cost .rv{color:var(--warn)}
.ri.time .rv{color:var(--accent2)}

.time-row{grid-column:3;display:flex;flex-direction:column;justify-content:center;gap:8px;
  background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 18px;align-items:center}
.time-row .tl{font-size:12px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.08em;text-align:center}
.time-row input[type=time]{font-size:28px;font-family:ui-monospace,Consolas,monospace;background:var(--card2);
  color:var(--txt);border:2px solid var(--line);border-radius:10px;padding:10px;width:100%;text-align:center}
.time-row input[type=time]:focus{outline:none;border-color:var(--accent)}
.pbtn{font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;border:none;border-radius:12px;
  background:var(--accent);color:#fff;padding:12px 20px;width:100%;transition:background .2s}
.pbtn:hover{background:#2f74c0}
.pbtn:active{transform:scale(.97)}

.start-row{grid-column:1/4;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.start-row .l{font-size:15px;color:var(--dim);font-weight:700}
.start-row .v{font-size:32px;font-weight:800;font-family:ui-monospace,Consolas,monospace;color:var(--accent2)}
.start-row .note{font-size:12px;color:var(--dim2);line-height:1.4}

.stop-row{grid-column:1/4;display:flex;gap:10px;flex-wrap:wrap}
.sbtn{flex:1;min-width:140px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;
  border:2px solid var(--line);border-radius:12px;padding:14px 18px;display:flex;align-items:center;
  justify-content:center;gap:8px;transition:all .2s;background:var(--card2);color:var(--dim)}
.sbtn:hover{border-color:var(--accent);color:var(--accent2)}
.sbtn:active{transform:scale(.97)}
.sbtn.danger{border-color:var(--bad);color:var(--bad);background:rgba(255,107,98,0.08)}
.sbtn.danger:hover{background:var(--bad);color:#fff}
.sbtn.ok{border-color:var(--ok);color:var(--ok);background:rgba(63,174,100,0.08)}
.sbtn.ok:hover{background:var(--ok);color:#fff}

#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#0f1724;
  border:2px solid var(--accent);color:#fff;font-size:15px;font-weight:700;padding:12px 20px;border-radius:10px;display:none;z-index:10}

@media(max-width:700px){
  #body{grid-template-columns:1fr 1fr;gap:10px;padding:12px}
  .result{grid-column:1/3}
  .time-row{grid-column:1/3;flex-direction:row;gap:14px}
  .time-row input[type=time]{max-width:160px}
  .pbtn{max-width:180px}
  .start-row,.stop-row{grid-column:1/3}
}
@media(max-width:480px){
  #body{grid-template-columns:1fr}
  .result,.time-row,.start-row,.stop-row{grid-column:1}
  .time-row{flex-direction:column}
  .time-row input[type=time],.pbtn{max-width:100%}
}
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <div id="ttl">⏰ SPA — PROGRAMMATION</div>
    <div id="bar-right">
      <span id="conn" class="ing">CONNEXION...</span>
      <div id="wt">--.-<small> °C</small></div>
    </div>
  </div>
  <div id="body">
    <div class="prow"><span class="l">Eau actuelle</span><span class="v" id="p-cur">--.- °C</span></div>
    <div class="prow"><span class="l">Consigne</span><span class="v" id="p-tgt">--.- °C</span></div>
    <div class="result">
      <div class="ri hl"><div class="rl">Temps restant</div><div class="rv" id="p-dur">--</div></div>
      <div class="ri cost"><div class="rl">Coût estimé</div><div class="rv" id="p-cost">--</div></div>
      <div class="ri time"><div class="rl">Prêt à</div><div class="rv" id="p-ready">--:--</div></div>
    </div>
    <div class="time-row">
      <div class="tl">Heure cible</div>
      <input type="time" id="p-time">
      <button class="pbtn" onclick="saveReady()">💾 Enregistrer</button>
    </div>
    <div class="start-row">
      <div style="display:flex;align-items:center;gap:16px">
        <span class="l">Démarrer la chauffe vers</span>
        <span class="v" id="p-start">--:--</span>
      </div>
      <span class="note" id="p-status">--</span>
    </div>
    <div class="stop-row">
      <button class="sbtn ok" onclick="startHeat()"><span>🔥</span> Démarrer la chauffe</button>
      <button class="sbtn danger" onclick="stopHeat()"><span>⏹</span> Arrêter la chauffe</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
"use strict";

const HA_URL  = location.protocol === 'https:' ? 'https://' + location.host : 'http://' + location.host;
const HA_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI4ZjFjNTRlZDRhYzQ0ZTM3YjczM2M4MDEyZjI1NThkYSIsImlhdCI6MTc3Nzc5NzIwNSwiZXhwIjoyMDkzMTU3MjA1fQ.YiyhAHNjm-lgSH67KZ-qmp-mlSsy2zZbHowjH6dCsbk';

const ENTITIES = [
    'sensor.layzspa_temp_c','sensor.layzspa_target_temp_c',
    'sensor.layzspa_time_to_ready','sensor.layzspa_energy_cost',
    'sensor.layzspa_electricity_price','sensor.layzspa_energy',
    'sensor.layzspa_power','binary_sensor.layzspa_heater',
    'climate.layzspa_temperature_control','input_datetime.spa_pret_a'
];

const gid = id => document.getElementById(id);
const HA = {};
let ws = null, msgId = 1;

function setConn(state) {
    const el = gid('conn');
    el.className = state;
    el.textContent = state === 'on' ? 'CONNECTÉ' : state === 'ing' ? 'CONNEXION...' : 'HORS LIGNE';
}

function toast(t) {
    const e = gid('toast');
    e.textContent = t;
    e.style.display = 'block';
    clearTimeout(e._t);
    e._t = setTimeout(() => e.style.display = 'none', 2500);
}

function n(eid) {
    const s = HA[eid];
    if (!s) return null;
    const v = parseFloat(s.state);
    return isNaN(v) ? null : v;
}
function st(eid) { const s = HA[eid]; return s ? s.state : null; }

function call(domain, service, data) {
    if (!ws || ws.readyState !== 1) { toast('Non connecté'); return; }
    ws.send(JSON.stringify({ id: msgId++, type: 'call_service', domain, service, service_data: data }));
}

function fmtH(h) {
    if (h == null || h <= 0) return '--';
    const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
    if (hh === 0) return mm + ' min';
    if (mm === 0) return hh + ' h';
    return hh + ' h ' + String(mm).padStart(2, '0');
}

function fmtTime(h) {
    if (h == null || h < 0) return '--:--';
    const now = new Date(), ready = new Date(now.getTime() + h * 3600000);
    return String(ready.getHours()).padStart(2, '0') + ':' + String(ready.getMinutes()).padStart(2, '0')
        + (ready.getDate() !== now.getDate() ? ' (demain)' : '');
}

function render() {
    const cur = n('climate.layzspa_temperature_control') || n('sensor.layzspa_temp_c');
    let target = null;
    const cl = HA['climate.layzspa_temperature_control'];
    if (cl && cl.attributes) target = parseFloat(cl.attributes.temperature);
    if (target == null) target = n('sensor.layzspa_target_temp_c');

    const ttr = n('sensor.layzspa_time_to_ready');
    const cost = n('sensor.layzspa_energy_cost');
    const kwhPrice = n('sensor.layzspa_electricity_price') || 0.1927;
    const energy = n('sensor.layzspa_energy');
    const heating = st('binary_sensor.layzspa_heater');
    const hvac = cl && cl.attributes ? cl.attributes.hvac_action : null;

    gid('wt').innerHTML = (cur == null ? '--.-' : cur.toFixed(1)) + '<small> °C</small>';
    gid('p-cur').textContent = (cur == null ? '--.-' : cur.toFixed(1)) + ' °C';
    gid('p-tgt').textContent = (target == null ? '--.-' : target.toFixed(1)) + ' °C';

    if (ttr != null && ttr > 0) {
        gid('p-dur').textContent = fmtH(ttr);
        gid('p-ready').textContent = fmtTime(ttr);
        const now = new Date();
        gid('p-start').textContent = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    } else {
        gid('p-dur').textContent = '--';
        gid('p-ready').textContent = '--:--';
        const inp = gid('p-time');
        if (ttr != null && ttr >= 0 && inp.value) {
            const [hh, mm] = inp.value.split(':').map(Number);
            const ready = new Date(); ready.setHours(hh, mm, 0, 0);
            if (ready < new Date()) ready.setDate(ready.getDate() + 1);
            const start = new Date(ready.getTime() - ttr * 3600000);
            gid('p-start').textContent = String(start.getHours()).padStart(2, '0') + ':' + String(start.getMinutes()).padStart(2, '0')
                + (start.getDate() !== new Date().getDate() ? ' (demain)' : '');
        } else {
            gid('p-start').textContent = '--:--';
        }
    }

    if (cost != null) gid('p-cost').textContent = cost.toFixed(2) + ' €';
    else if (energy != null) gid('p-cost').textContent = (energy * kwhPrice).toFixed(2) + ' €';
    else gid('p-cost').textContent = '--';

    const statusEl = gid('p-status');
    if (heating === 'on' || hvac === 'heating') {
        statusEl.innerHTML = '<span style="color:var(--warn)">🔥 Chauffe en cours</span> · ' + (energy != null ? energy.toFixed(1) + ' kWh · ' : '') + kwhPrice.toFixed(3) + ' €/kWh';
    } else if (cur != null && target != null && cur >= target - 0.5) {
        statusEl.innerHTML = '<span style="color:var(--ok)">✓ À température</span>';
    } else {
        statusEl.innerHTML = '<span style="color:var(--dim2)">En attente</span>';
    }

    const sch = st('input_datetime.spa_pret_a');
    const inp = gid('p-time');
    if (sch && !inp.dataset.user) {
        const m = String(sch).match(/(\d{2}):(\d{2})/);
        if (m) inp.value = m[1] + ':' + m[2];
    }
}

function saveReady() {
    const v = gid('p-time').value;
    if (!v) { toast('Choisis une heure'); return; }
    gid('p-time').dataset.user = '1';
    call('input_datetime', 'set_datetime', { entity_id: 'input_datetime.spa_pret_a', time: v + ':00' });
    toast('Heure enregistrée ✔');
}

function startHeat() {
    call('climate', 'set_temperature', { entity_id: 'climate.layzspa_temperature_control', hvac_mode: 'heat' });
    toast('Chauffe démarrée 🔥');
}

function stopHeat() {
    call('climate', 'set_hvac_mode', { entity_id: 'climate.layzspa_temperature_control', hvac_mode: 'off' });
    toast('Chauffe arrêtée ⏹');
}

document.addEventListener('input', e => {
    if (e.target.id === 'p-time') { e.target.dataset.user = '1'; render(); }
});

function connect() {
    setConn('ing');
    try { ws = new WebSocket(HA_URL.replace(/^http/, 'ws') + '/api/websocket'); }
    catch (e) { setConn('off'); setTimeout(connect, 5000); return; }

    ws.onopen = () => { ws.send(JSON.stringify({ type: 'auth', access_token: HA_TOKEN })); };

    ws.onmessage = ev => {
        const m = JSON.parse(ev.data);
        if (m.type === 'auth_ok') {
            setConn('on');
            ws.send(JSON.stringify({ id: msgId++, type: 'subscribe_events', event_type: 'state_changed' }));
            ws.send(JSON.stringify({ id: msgId++, type: 'get_states' }));
        }
        else if (m.type === 'auth_invalid') { setConn('off'); toast('Token invalide'); ws.close(); }
        else if (m.type === 'result' && Array.isArray(m.result)) {
            m.result.forEach(s => { HA[s.entity_id] = s; });
            render();
        }
        else if (m.type === 'event' && m.event && m.event.data) {
            const s = m.event.data.new_state;
            if (s && ENTITIES.includes(s.entity_id)) { HA[s.entity_id] = s; render(); }
        }
    };

    ws.onclose = () => { setConn('off'); setTimeout(connect, 5000); };
    ws.onerror = () => { ws.close(); };
}

connect();
</script>
</body>
</html>
