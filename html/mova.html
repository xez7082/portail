<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVA ViAX 250</title>
<style>
:root{
  --bg:#1c2431; --card:#27303f; --card2:#2f3a4c; --line:#3c4a5e; --txt:#eef3fa;
  --dim:#aebdd0; --dim2:#55677f; --accent:#4da3ff; --accent2:#a8d1ff;
  --ok:#3fae64; --okl:#7ddb9a; --warn:#f0b429; --bad:#ff6b62; --cyan:#22d3ee;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:ui-monospace,Consolas,"Segoe UI Mono",monospace;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;padding:10px 12px;
  display:grid;grid-template-columns:1fr minmax(220px,32%);grid-template-rows:auto minmax(0,1fr) auto;gap:8px 12px;overflow:hidden}
#hdr{grid-column:1/-1;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
@media(max-width:760px){#app{grid-template-columns:1fr;overflow-y:auto}}

#hdr .n{font-size:20px;font-weight:800;color:var(--okl);letter-spacing:.08em}
#hdr .m{font-size:13px;color:var(--dim2);margin-top:2px}
#batbox{margin-left:auto;display:flex;gap:12px;align-items:center}
#bat{border:1px solid var(--line);border-radius:10px;padding:8px 16px;text-align:center}
#bat .l{font-size:11px;color:var(--dim);letter-spacing:.14em}
#bat .v{font-size:21px;font-weight:800;color:var(--okl)}
#chst{border:1px solid rgba(77,163,255,.4);color:var(--accent2);border-radius:10px;
  padding:9px 14px;font-size:13px;font-weight:800;letter-spacing:.08em}

.colL{display:flex;flex-direction:column;gap:8px;min-height:0;overflow:hidden;justify-content:space-between}
.sect{font-size:12px;letter-spacing:.16em;color:var(--warn);font-weight:800}
.frow{display:flex;gap:10px;align-items:center}
.frow .l{font-size:13px;color:var(--dim);letter-spacing:.1em;width:70px;flex-shrink:0}
select{flex:1;font-size:15px;font-family:inherit;background:var(--card);color:var(--txt);
  border:2px solid var(--line);border-radius:10px;padding:8px 10px;min-height:44px}
select:focus{border-color:var(--accent);outline:none}

.cons{display:flex;flex-direction:column;gap:7px}
.cr{display:flex;gap:10px;align-items:center}
.cr .l{font-size:14px;width:70px;flex-shrink:0}
.cr .bar{flex:1;height:10px;border-radius:5px;background:var(--card2);overflow:hidden}
.cr .bar div{height:100%;width:0%;border-radius:5px;transition:width .5s,background .4s}
.cr b{font-size:15px;width:48px;text-align:right}
.rst{font-size:15px;min-width:40px;min-height:40px;border:2px solid var(--line);
  background:var(--card);color:var(--dim);border-radius:8px;cursor:pointer;font-family:inherit}
.rst:hover{border-color:var(--accent);color:var(--accent2)}

#btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.ab{font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;border-radius:12px;
  padding:10px;min-height:50px;border:2px solid var(--line);background:var(--card)}
.ab:hover{filter:brightness(1.2)}
.ab.mow{color:var(--okl);border-color:rgba(63,174,100,.5)}
.ab.pa{color:var(--warn);border-color:rgba(240,180,41,.5)}
.ab.dock{color:var(--cyan)}
.ab.soft{color:var(--dim)}

#mapbox{background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:10px;display:flex;flex-direction:column;gap:8px;min-height:0}
#mapbox .t{font-size:12px;letter-spacing:.14em;color:var(--cyan);font-weight:800}
#mapimg{flex:1;min-height:0;width:100%;object-fit:contain;border-radius:8px;background:#e9efe6}
#maperr{flex:1;display:flex;align-items:center;justify-content:center;color:var(--dim2);
  font-size:14px;text-align:center;padding:12px}
#foot{grid-column:1/-1;display:flex;justify-content:space-between;font-size:11px;color:var(--dim2);letter-spacing:.1em;padding-top:2px}
#foot .live{color:var(--okl);font-weight:800}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#0f1724;
  border:2px solid var(--accent);color:#fff;font-size:15px;font-weight:700;
  padding:12px 20px;border-radius:10px;display:none;z-index:10}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <img id="photo" src="/local/images/mova_viax.png" alt="MOVA ViAX 250"
         style="width:64px;height:64px;border-radius:12px;object-fit:contain;background:var(--card2);flex-shrink:0"
         onerror="this.style.display='none';document.getElementById('emo').style.display='inline'">
    <div>
      <div class="n"><span id="emo" style="display:none">🌱 </span>MOVA</div>
      <div class="m">ViAX 250 · lawn_mower.eve</div>
    </div>
    <div id="batbox">
      <div id="bat"><div class="l">BATTERIE</div><div class="v" id="batv">--%</div></div>
      <div id="chst">--</div>
    </div>
  </div>

  <div class="colL">
    <div class="sect">CONFIGURATION</div>
    <div class="frow"><span class="l">CARTE</span><select id="sel-map" onchange="setMap()"></select></div>
    <div class="frow"><span class="l">ZONE</span><select id="sel-zone"></select></div>
    <div class="frow"><span class="l">ACTION</span>
      <select id="sel-act">
        <option value="all">Toute la surface</option>
        <option value="zone">Zone sélectionnée uniquement</option>
      </select>
    </div>

    <div class="sect">CONSOMMABLES</div>
    <div class="cons" id="cons"></div>

    <div id="btns">
      <button class="ab mow"  onclick="mow()">▶ TONDRE</button>
      <button class="ab pa"   onclick="lm('pause')">⏸ PAUSE</button>
      <button class="ab dock" onclick="lm('dock')">⌂ BASE</button>
      <button class="ab soft" onclick="softDock()">⌂ BASE DOUX</button>
    </div>
  </div>

  <div id="mapbox">
    <div class="t">📷 CARTE LIVE</div>
    <img id="mapimg" alt="Carte tondeuse" style="display:none">
    <div id="maperr">Carte indisponible</div>
  </div>

  <div id="foot"><span>UNIT-MOW-01 · lawn_mower.eve</span><span class="live">● LIVE</span></div>
</div>
<div id="toast"></div>

<script>
"use strict";
const CFG={
  HA_URL:location.origin, /* local + Nabu Casa */
  HA_TOKEN:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI1MTdmOWM3YWU1ZjE0MzZjYjNjYzQ2Nzg4ZDI2MTU0YSIsImlhdCI6MTc4MzQ5MDE4OCwiZXhwIjoyMDk4ODUwMTg4fQ.WqwBlvCxIUE36VZd82RHkVmV9Ep5s9uFJ95f7jAuWlY',

  /* ── Entités MOVA (ajuster ici si besoin) ── */
  MOWER:'lawn_mower.eve',
  MAP_SELECT:'select.eve_selected_map',       /* sélecteur de carte de l'intégration */
  MAP_CAMERA:'camera.eve_map',                /* carte live */
  /* Consommables : [label, clé d'attribut du mower OU entité sensor, bouton reset] */
  CONSUMABLES:[
    ['LAMES','blades_left','button.eve_reinitialiser_le_compteur_des_lames'],
    ['MAINT.','maintenance_left','button.eve_reinitialiser_le_compteur_de_maintenance'],
    ['BROSSE','lens_brush_left','button.eve_reinitialiser_le_compteur_de_brosse']
  ],
  /* Zones (segments) — ids de l'appli MOVA */
  ZONES:[
    {n:'Zone spa (#1)', id:1},
    {n:'Zone est (#2)', id:2},
    {n:'Zone sud (#3)', id:3}
  ],
  /* Service de tonte par zone (intégration dreame-mower) */
  ZONE_SERVICE:{domain:'dreame_mower', service:'mower_clean_segment'}
};

const gid=id=>document.getElementById(id);
const HA={}; let ws=null,msgId=1,camToken='',camSrc='';
const FOUND={bat:null,lames:null,maint:null,brosse:null};

/* Reconnaît automatiquement les entités "eve" quel que soit leur nom (FR/EN) */
function discover(states){
  const eve=states.filter(x=>x.entity_id&&/(^|\.)eve_|\.eve$/.test(x.entity_id));
  console.log('%c[MOVA] '+eve.length+' entités "eve" détectées :','color:#7ddb9a;font-weight:bold');
  eve.forEach(x=>console.log('  '+x.entity_id+' = '+x.state));
  const find=(dom,re)=>{const m=eve.find(x=>x.entity_id.startsWith(dom+'.')&&re.test(x.entity_id));return m?m.entity_id:null;};
  FOUND.bat   = find('sensor',/batter|battery/);
  FOUND.lames = find('sensor',/lame|blade/);
  FOUND.maint = find('sensor',/maintenance/);
  FOUND.brosse= find('sensor',/bross|brush|lens/);
  const map=find('select',/carte|map/);   if(map) CFG.MAP_SELECT=map;
  const cam=find('camera',/./);           if(cam) CFG.MAP_CAMERA=cam;
  console.log('%c[MOVA] mapping :','color:#4da3ff;font-weight:bold',JSON.stringify(FOUND),CFG.MAP_SELECT,CFG.MAP_CAMERA);
}
const st=e=>{const s=HA[e]?HA[e].state:null;return(s==null||s==='unknown'||s==='unavailable')?null:s;};
function toast(t){const e=gid('toast');e.textContent=t;e.style.display='block';
  clearTimeout(e._h);e._h=setTimeout(()=>e.style.display='none',2500);}
function call(domain,service,data){
  if(!ws||ws.readyState!==1){toast('Non connecté');return;}
  ws.send(JSON.stringify({id:msgId++,type:'call_service',domain,service,service_data:data}));
}

/* ── Construction ── */
gid('cons').innerHTML=CFG.CONSUMABLES.map((c,i)=>`
  <div class="cr">
    <span class="l">${c[0]}</span>
    <div class="bar"><div id="cb-${i}"></div></div>
    <b id="cv-${i}">--%</b>
    <button class="rst" onclick="resetCons(${i})" title="Remettre à zéro" aria-label="Reset ${c[0]}">↺</button>
  </div>`).join('');
gid('sel-zone').innerHTML=CFG.ZONES.map(z=>`<option value="${z.id}">${z.n}</option>`).join('');

/* ── Actions ── */
function lm(service){ call('lawn_mower',service,{entity_id:CFG.MOWER}); toast('Commande envoyée ✔'); }
function mow(){
  if(gid('sel-act').value==='zone'){
    const id=parseInt(gid('sel-zone').value,10);
    call(CFG.ZONE_SERVICE.domain,CFG.ZONE_SERVICE.service,{entity_id:CFG.MOWER,segments:[id]});
    toast('Tonte de la zone ▶');
  }else lm('start_mowing');
}
function softDock(){
  /* retour base sans tonte du trajet : pause puis dock */
  call('lawn_mower','pause',{entity_id:CFG.MOWER});
  setTimeout(()=>call('lawn_mower','dock',{entity_id:CFG.MOWER}),800);
  toast('Retour base (doux) ⌂');
}
function setMap(){
  call('select','select_option',{entity_id:CFG.MAP_SELECT,option:gid('sel-map').value});
  toast('Carte changée ✔');
}
function resetCons(i){
  const c=CFG.CONSUMABLES[i];
  if(!confirm('Remettre le compteur '+c[0]+' à 100 % ?'))return;
  call('button','press',{entity_id:c[2]}); toast(c[0]+' remis à zéro ✔');
}

/* ── Rendu ── */
const CHARGE={charging:['EN CHARGE','var(--accent2)'],docked:['CHARGE COMPLÈTE','var(--accent2)'],
  mowing:['TONTE EN COURS','var(--okl)'],paused:['PAUSE','var(--warn)'],
  returning:['RETOUR BASE','var(--cyan)'],error:['ERREUR','var(--bad)']};
function render(){
  const mw=HA[CFG.MOWER], A=mw&&mw.attributes?mw.attributes:{};
  let b=A.battery_level!=null?A.battery_level:A.battery;
  if(b==null&&FOUND.bat&&HA[FOUND.bat]){const v=parseFloat(HA[FOUND.bat].state);if(!isNaN(v))b=v;}
  gid('batv').textContent=b==null?'--%':Math.round(b)+'%';
  const s=mw?mw.state:null;
  const m=CHARGE[s]||[s?String(s).toUpperCase():'--','var(--dim)'];
  const ce=gid('chst');
  ce.textContent=(s==='docked'&&b>=100)?'CHARGE COMPLÈTE':m[0];
  ce.style.color=m[1]; ce.style.borderColor=m[1];

  /* Sélecteur de carte : options réelles du select HA */
  const sel=HA[CFG.MAP_SELECT];
  const box=gid('sel-map');
  if(sel&&sel.attributes&&Array.isArray(sel.attributes.options)){
    const opts=sel.attributes.options;
    if(box.options.length!==opts.length){
      box.innerHTML=opts.map(o=>`<option>${o}</option>`).join('');
    }
    if(document.activeElement!==box) box.value=sel.state;
  }else if(!box.options.length){
    box.innerHTML='<option>Carte par défaut</option>';
  }

  /* Consommables : attribut du mower ou capteur dédié */
  const FKEY=['lames','maint','brosse'];
  CFG.CONSUMABLES.forEach((c,i)=>{
    let p=null;
    if(A[c[1]]!=null) p=parseFloat(A[c[1]]);
    if((p==null||isNaN(p))&&FOUND[FKEY[i]]&&HA[FOUND[FKEY[i]]]){
      const v=parseFloat(HA[FOUND[FKEY[i]]].state); if(!isNaN(v))p=v;
    }
    if(p!=null&&isNaN(p))p=null;
    gid('cv-'+i).textContent=p==null?'--%':Math.round(p)+'%';
    const f=gid('cb-'+i);
    f.style.width=(p==null?0:Math.max(0,Math.min(100,p)))+'%';
    f.style.background=p==null?'var(--dim2)':p<=20?'var(--bad)':p<=50?'var(--warn)':'var(--ok)';
  });

  /* Carte live */
  const cam=HA[CFG.MAP_CAMERA];
  const t=cam&&cam.attributes?cam.attributes.access_token:null;
  if(t&&t!==camToken){
    camToken=t;
    camSrc=CFG.HA_URL+'/api/camera_proxy/'+CFG.MAP_CAMERA+'?token='+encodeURIComponent(t)+'&t='+Date.now();
    const img=gid('mapimg');
    img.onload=()=>{img.style.display='block';gid('maperr').style.display='none';};
    img.onerror=()=>{img.style.display='none';gid('maperr').style.display='flex';};
    img.src=camSrc;
  }
}
/* rafraîchir l'image de carte toutes les 30 s */
setInterval(()=>{const img=gid('mapimg');if(camSrc)img.src=camSrc.replace(/&t=\d+/,'&t='+Date.now());},30000);

function connectWS(){
  const url=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/api/websocket';
  ws=new WebSocket(url);
  ws.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    if(m.type==='auth_required')ws.send(JSON.stringify({type:'auth',access_token:CFG.HA_TOKEN}));
    else if(m.type==='auth_ok'){
      ws.send(JSON.stringify({id:msgId++,type:'subscribe_events',event_type:'state_changed'}));
      ws.send(JSON.stringify({id:msgId++,type:'get_states'}));
    }
    else if(m.type==='result'&&Array.isArray(m.result)){
      m.result.forEach(x=>{HA[x.entity_id]=x;});
      discover(m.result);
      render();
    }
    else if(m.type==='event'&&m.event?.event_type==='state_changed'){
      const x=m.event.data.new_state; if(x){HA[x.entity_id]=x; render();}
    }
  };
  ws.onclose=()=>setTimeout(connectWS,5000);
  ws.onerror=()=>ws.close();
}
render(); connectWS();
</script>
</body>
</html>
