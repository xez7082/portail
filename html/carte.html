<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte de présence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --bg:#1c2431; --card:#27303f; --card2:#2f3a4c; --line:#3c4a5e; --txt:#eef3fa;
  --dim:#aebdd0; --dim2:#55677f; --accent:#4da3ff; --okl:#7ddb9a; --warn:#f0b429; --violet:#a5b4fc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column}
#hdr{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;
  padding:12px;background:var(--bg);flex-shrink:0}
.pc{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 14px;
  display:flex;gap:12px;align-items:center;cursor:pointer}
.pc:hover{border-color:var(--accent)}
.pc img{width:46px;height:46px;border-radius:50%;object-fit:cover;border:3px solid var(--okl);flex-shrink:0;background:var(--card2)}
.pc img.away{border-color:var(--warn)}
.pc .top{font-size:17px;font-weight:800;display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.pc .st{font-size:14px;font-weight:800}
.pc .st.home{color:var(--okl)} .pc .st.away{color:var(--warn)}
.pc .di{font-size:14px;color:var(--accent2,#a8d1ff)}
.pc .ad{font-size:13px;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#map{flex:1;min-height:0;background:#e8ecf1}
/* marqueurs */
.pmark{display:flex;flex-direction:column;align-items:center;gap:4px}
.pmark img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:3px solid var(--okl);
  box-shadow:0 0 12px rgba(125,219,154,.5);background:var(--card2)}
.pmark img.away{border-color:var(--warn);box-shadow:0 0 12px rgba(240,180,41,.5)}
.pmark .lb{background:rgba(28,36,49,.9);border:1px solid var(--line);color:#fff;
  font-size:13px;font-weight:700;padding:2px 8px;border-radius:6px;white-space:nowrap}
.hmark{font-size:30px;filter:drop-shadow(0 0 8px rgba(77,163,255,.7))}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--txt)!important;border-color:var(--line)!important;
  width:44px!important;height:44px!important;line-height:44px!important;font-size:22px!important}
.leaflet-control-attribution{background:rgba(28,36,49,.8)!important;color:var(--dim2)!important;font-size:10px!important}
.leaflet-control-attribution a{color:var(--dim)!important}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"></div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
"use strict";
const CFG={
  HA_URL:location.origin, /* local + Nabu Casa */
  HA_TOKEN:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI1MTdmOWM3YWU1ZjE0MzZjYjNjYzQ2Nzg4ZDI2MTU0YSIsImlhdCI6MTc4MzQ5MDE4OCwiZXhwIjoyMDk4ODUwMTg4fQ.WqwBlvCxIUE36VZd82RHkVmV9Ep5s9uFJ95f7jAuWlY',
  HOME:[48.003217153523735, 7.380798166779817],
  ZOOM:14,
  PERSONS:[
    {n:'Patrick', img:'/local/images/patrick.png',
     person:'person.patrick_cubot_2', geo:'sensor.cubot_geocoded_location',
     dist:'sensor.distance_domicile_corrigee_patrick'},
    {n:'Sandra', img:'/local/images/sandra.png',
     person:'person.sandra_note_21', geo:'sensor.note_21_geocoded_location',
     dist:'sensor.distance_domicile_corrigee_sandra'}
  ]
};

const gid=id=>document.getElementById(id);
const HA={}; let ws=null,msgId=1;
const num=e=>{const s=HA[e];const v=s?parseFloat(s.state):NaN;return isNaN(v)?null:v;};
const st=e=>{const s=HA[e]?HA[e].state:null;return(s==null||s==='unknown'||s==='unavailable')?null:s;};

/* ── Carte ── */
const map=L.map('map',{zoomControl:true}).setView(CFG.HOME,CFG.ZOOM);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  maxZoom:19, attribution:'&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);
L.marker(CFG.HOME,{icon:L.divIcon({className:'',html:'<div class="hmark">🏠</div>',iconSize:[30,30],iconAnchor:[15,15]})})
 .addTo(map);

const markers=CFG.PERSONS.map(p=>{
  const icon=L.divIcon({className:'',iconSize:[60,80],iconAnchor:[30,40],
    html:`<div class="pmark"><img id="mk-img-${p.n}" src="${p.img}"><span class="lb">${p.n}</span></div>`});
  return L.marker(CFG.HOME,{icon}).addTo(map);
});

/* ── Bandeaux ── */
gid('hdr').innerHTML=CFG.PERSONS.map((p,i)=>`
  <div class="pc" onclick="focusOn(${i})" role="button" tabindex="0" title="Centrer sur ${p.n}">
    <img id="hd-img-${i}" src="${p.img}" alt="${p.n}">
    <div style="min-width:0">
      <div class="top">${p.n}
        <span class="st home" id="hd-st-${i}">--</span>
        <span class="di">📍 <span id="hd-d-${i}">--</span> km</span>
      </div>
      <div class="ad" id="hd-ad-${i}">--</div>
    </div>
  </div>`).join('');

let fitted=false;
function focusOn(i){
  const ll=markers[i].getLatLng();
  map.flyTo(ll,16,{duration:.8});
}
function fitAll(){
  const pts=markers.map(m=>m.getLatLng()).concat([L.latLng(CFG.HOME)]);
  map.fitBounds(L.latLngBounds(pts).pad(0.3),{maxZoom:15});
}

function render(){
  CFG.PERSONS.forEach((p,i)=>{
    const pe=HA[p.person];
    const ps=st(p.person);
    const home=ps==='home';
    const se=gid('hd-st-'+i);
    se.textContent=ps==null?'--':(home?'À DOMICILE':ps==='not_home'?'ABSENT':ps.toUpperCase());
    se.className='st '+(home?'home':'away');
    gid('hd-img-'+i).className=home?'':'away';
    const mi=document.getElementById('mk-img-'+p.n);
    if(mi) mi.className=home?'':'away';

    const d=num(p.dist);
    gid('hd-d-'+i).textContent=d==null?'--':d.toFixed(2).replace('.',',');
    gid('hd-ad-'+i).textContent=st(p.geo)||'--';

    const lat=pe&&pe.attributes?pe.attributes.latitude:null;
    const lon=pe&&pe.attributes?pe.attributes.longitude:null;
    if(lat!=null&&lon!=null) markers[i].setLatLng([lat,lon]);
  });
  if(!fitted && CFG.PERSONS.every(p=>HA[p.person])){ fitted=true; fitAll(); }
}

function connectWS(){
  const url=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/api/websocket';
  ws=new WebSocket(url);
  ws.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    if(m.type==='auth_required')ws.send(JSON.stringify({type:'auth',access_token:CFG.HA_TOKEN}));
    else if(m.type==='auth_ok'){
      ws.send(JSON.stringify({id:msgId++,type:'subscribe_events',event_type:'state_changed'}));
      ws.send(JSON.stringify({id:msgId++,type:'get_states'}));
    }
    else if(m.type==='result'&&Array.isArray(m.result)){
      m.result.forEach(s=>{HA[s.entity_id]=s;}); render();
    }
    else if(m.type==='event'&&m.event?.event_type==='state_changed'){
      const s=m.event.data.new_state; if(s){HA[s.entity_id]=s; render();}
    }
  };
  ws.onclose=()=>setTimeout(connectWS,5000);
  ws.onerror=()=>ws.close();
}
window.addEventListener('resize',()=>map.invalidateSize());
connectWS();
</script>
</body>
</html>
