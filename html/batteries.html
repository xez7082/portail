<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batteries</title>
<style>
:root{
  --bg:#1c2431; --card:#27303f; --card2:#2f3a4c; --line:#3c4a5e; --txt:#eef3fa;
  --dim:#aebdd0; --dim2:#55677f; --accent:#4da3ff; --accent2:#a8d1ff;
  --ok:#3fae64; --okl:#7ddb9a; --warn:#f0b429; --bad:#ff6b62;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);
  font-family:ui-monospace,Consolas,"Segoe UI Mono",monospace;overflow:hidden}
#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;
  overflow-y:auto;scrollbar-width:thin;padding:18px;gap:16px}
h1{font-size:clamp(16px,2.4vh,20px);letter-spacing:.2em;color:var(--accent2);font-weight:800;text-align:center}

#cells{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.cell{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;
  display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start}
.left{display:flex;flex-direction:column;align-items:center;gap:10px}
.left svg{width:86px;height:auto}
.soc{font-size:30px;font-weight:800;color:var(--accent2)}

.right{display:flex;flex-direction:column;gap:10px;min-width:0}
.nm{font-size:18px;font-weight:800;letter-spacing:.08em}
.stt{font-size:13px;font-weight:800;letter-spacing:.12em}
.stt.ok{color:var(--okl)} .stt.warn{color:var(--warn)} .stt.bad{color:var(--bad)}
.socbar{height:6px;border-radius:3px;background:var(--card2);overflow:hidden}
.socbar div{height:100%;width:0%;border-radius:3px;transition:width .6s,background .4s}

.box{background:var(--card2);border-radius:10px;padding:10px 12px}
.box .l{font-size:12px;color:var(--dim);letter-spacing:.14em;font-weight:700}
.box .flow{font-size:14px;font-weight:800;margin-top:4px}
.flow.dis{color:var(--warn)} .flow.chg{color:var(--okl)} .flow.idle{color:var(--dim2)}
.box .v{font-size:26px;font-weight:800;margin-top:2px}
.box .v small{font-size:14px;color:var(--dim)}
.box .s{font-size:13px;color:var(--dim2);margin-top:2px}

#tot{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;
  display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
#tot .l{font-size:14px;letter-spacing:.14em;font-weight:800;color:var(--dim)}
#tot .v{font-size:34px;font-weight:800;color:#a5b4fc}
#tot .v small{font-size:16px;color:var(--dim)}
</style>
</head>
<body>
<div id="app">
  <h1>POWER CELLS — STOCKAGE MAISON</h1>
  <div id="cells"></div>
  <div id="tot">
    <span class="l">PUISSANCE BATTERIE TOTALE</span>
    <span class="v"><span id="tp">--</span> <small>W</small></span>
  </div>
</div>

<script>
"use strict";
const CFG={
  HA_URL:location.origin, /* local + Nabu Casa */
  HA_TOKEN:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI1MTdmOWM3YWU1ZjE0MzZjYjNjYzQ2Nzg4ZDI2MTU0YSIsImlhdCI6MTc4MzQ5MDE4OCwiZXhwIjoyMDk4ODUwMTg4fQ.WqwBlvCxIUE36VZd82RHkVmV9Ep5s9uFJ95f7jAuWlY',
  TOTAL:'sensor.puissance_batterie_totale',
  /* invert:true si le signe charge/décharge est à l'envers pour une batterie */
  CELLS:[
    {n:'VENUS E 3.0', col:'#4da3ff',
     soc:'sensor.marstek_venus_modbus_battery_soc',
     pow:'sensor.marstek_venus_modbus_battery_power',
     temp:'sensor.marstek_venus_modbus_internal_temperature',
     sto:'sensor.marstek_venus_modbus_stored_energy', stoU:'kWh', cap:5120, invert:false},
    {n:'S1000 MAÎTRE', col:'#7ddb9a',
     soc:'sensor.niveau_batterie_9105231027496254_maitre_2',
     pow:'sensor.puissance_sortie_storcube_2',
     temp:'sensor.temperature_batterie_9105231027496254_maitre_2',
     sto:'sensor.capacite_batterie_9105231027496254_maitre', stoU:'Wh', cap:1024, invert:false},
    {n:'S1000 ESCLAVE', col:'#7ddb9a',
     soc:'sensor.niveau_batterie_9105231027498075_esclave_2',
     pow:'number.puissance_de_sortie_storcube',
     temp:'sensor.temperature_batterie_9105231027498075_esclave_2',
     sto:'sensor.capacite_batterie_9105231027498075_esclave', stoU:'Wh', cap:1024, invert:false}
  ]
};

const gid=id=>document.getElementById(id);
const HA={}; let ws=null,msgId=1;
const num=e=>{const s=HA[e];const v=s?parseFloat(s.state):NaN;return isNaN(v)?null:v;};

function battSvg(i){
  return `<svg viewBox="0 0 90 170">
    <rect x="30" y="4" width="30" height="12" rx="4" fill="var(--dim2)"/>
    <rect x="8" y="16" width="74" height="148" rx="12" fill="var(--card2)" stroke="var(--line)" stroke-width="2.5"/>
    <clipPath id="bc-${i}"><rect x="14" y="22" width="62" height="136" rx="8"/></clipPath>
    <g clip-path="url(#bc-${i})">
      <rect id="bf-${i}" x="14" y="158" width="62" height="0" fill="var(--ok)"/>
      <rect id="bw-${i}" x="14" y="158" width="62" height="4" fill="#fff" opacity=".25"/>
    </g>
    <g stroke="var(--dim2)" stroke-width="1.4" opacity=".6">
      <line x1="14" y1="56" x2="24" y2="56"/><line x1="14" y1="90" x2="24" y2="90"/><line x1="14" y1="124" x2="24" y2="124"/>
    </g>
  </svg>`;
}

gid('cells').innerHTML=CFG.CELLS.map((c,i)=>`
  <div class="cell">
    <div class="left">${battSvg(i)}<div class="soc" id="soc-${i}">--%</div></div>
    <div class="right">
      <div>
        <div class="nm" style="color:${c.col}">${c.n}</div>
        <div class="stt" id="st-${i}">…</div>
      </div>
      <div class="socbar"><div id="sb-${i}"></div></div>
      <div class="box">
        <div class="l">PUISSANCE</div>
        <div class="flow idle" id="fl-${i}">—</div>
        <div class="v" id="pw-${i}">-- <small>W</small></div>
      </div>
      <div class="box">
        <div class="l">STOCKÉ</div>
        <div class="v" id="sto-${i}">-- <small>${c.stoU}</small></div>
        <div class="s">/ ${c.stoU==='kWh'?(c.cap/1000).toFixed(1)+' kWh':c.cap+' Wh'} max</div>
      </div>
      <div class="box">
        <div class="l">TEMPÉRATURE</div>
        <div class="v" id="tm-${i}">--.- <small>°C</small></div>
      </div>
    </div>
  </div>`).join('');

function socCol(p){return p==null?'var(--dim2)':p<=15?'var(--bad)':p<=35?'var(--warn)':'var(--ok)';}

function render(){
  CFG.CELLS.forEach((c,i)=>{
    const soc=num(c.soc), p0=num(c.pow), t=num(c.temp), sto=num(c.sto);
    const p=(p0==null)?null:(c.invert?-p0:p0);

    gid('soc-'+i).textContent=soc==null?'--%':Math.round(soc)+'%';
    const h=soc==null?0:Math.max(0,Math.min(100,soc))/100*136;
    const bf=gid('bf-'+i);
    bf.setAttribute('y',158-h); bf.setAttribute('height',h); bf.setAttribute('fill',socCol(soc));
    gid('bw-'+i).setAttribute('y',158-h);
    const sb=gid('sb-'+i);
    sb.style.width=(soc==null?0:Math.min(100,soc))+'%'; sb.style.background=socCol(soc);

    const fl=gid('fl-'+i);
    if(p==null){fl.className='flow idle';fl.textContent='—';}
    else if(p>5){fl.className='flow dis';fl.textContent='▲ DÉCHARGE';}
    else if(p<-5){fl.className='flow chg';fl.textContent='▼ CHARGE';}
    else{fl.className='flow idle';fl.textContent='VEILLE';}
    gid('pw-'+i).innerHTML=(p==null?'--':Math.abs(Math.round(p)))+' <small>W</small>';

    gid('sto-'+i).innerHTML=(sto==null?'--':(c.stoU==='kWh'?sto.toFixed(2):Math.round(sto)))+' <small>'+c.stoU+'</small>';

    const tm=gid('tm-'+i);
    tm.innerHTML=(t==null?'--.-':t.toFixed(1))+' <small>°C</small>';
    tm.style.color=t==null?'var(--dim2)':t>=45?'var(--bad)':t>=38?'var(--warn)':'var(--accent2)';

    const st=gid('st-'+i);
    if(soc==null&&p==null){st.className='stt';st.textContent='INDISPONIBLE';}
    else if(t!=null&&t>=45){st.className='stt bad';st.textContent='⚠ TEMPÉRATURE ÉLEVÉE';}
    else if(soc!=null&&soc<=10){st.className='stt warn';st.textContent='BATTERIE FAIBLE';}
    else{st.className='stt ok';st.textContent='NOMINAL';}
  });
  const tp=num(CFG.TOTAL);
  gid('tp').textContent=tp==null?'--':Math.round(tp);
}

function connectWS(){
  const url=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/api/websocket';
  ws=new WebSocket(url);
  ws.onmessage=ev=>{
    const m=JSON.parse(ev.data);
    if(m.type==='auth_required')ws.send(JSON.stringify({type:'auth',access_token:CFG.HA_TOKEN}));
    else if(m.type==='auth_ok'){
      ws.send(JSON.stringify({id:msgId++,type:'subscribe_events',event_type:'state_changed'}));
      ws.send(JSON.stringify({id:msgId++,type:'get_states'}));
    }
    else if(m.type==='result'&&Array.isArray(m.result)){
      m.result.forEach(s=>{HA[s.entity_id]=s;}); render();
    }
    else if(m.type==='event'&&m.event?.event_type==='state_changed'){
      const s=m.event.data.new_state; if(s){HA[s.entity_id]=s; render();}
    }
  };
  ws.onclose=()=>setTimeout(connectWS,5000);
  ws.onerror=()=>ws.close();
}
render(); connectWS();
</script>
</body>
</html>
